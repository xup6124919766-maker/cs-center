<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>女神刮刮樂 — 梵森</title>
<link rel="stylesheet" href="/play/_shared.css">
<style>
/* ── 刮刮樂專屬 ── */
.scratch-page { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }

/* 刮卡容器 */
.scratch-wrap {
  position: relative;
  width: 320px;
  height: 200px;
  margin: 0 auto 20px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 0 2px rgba(212,175,55,0.4), 0 12px 40px rgba(0,0,0,0.6);
  cursor: crosshair;
  touch-action: none;
}

/* 獎品底層 */
.prize-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 1;
  padding: 16px;
  background: linear-gradient(135deg, #1e1235 0%, #2c1f3d 50%, #1a1a2e 100%);
  text-align: center;
}
.prize-emoji-big { font-size: 56px; margin-bottom: 8px; }
.prize-name-reveal {
  font-size: 18px;
  font-weight: 800;
  font-family: "PingFang TC", "Noto Serif TC", serif;
  background: linear-gradient(135deg, #D4AF37, #FFD700, #B8860B);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.3;
}
.prize-desc-reveal { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 4px; }
.prize-coupon-reveal {
  font-size: 16px; font-weight: 800; color: #D4AF37;
  letter-spacing: 2px;
  background: rgba(212,175,55,0.12);
  border: 1px dashed rgba(212,175,55,0.4);
  border-radius: 8px;
  padding: 6px 12px;
  margin-top: 8px;
  display: none;
}

/* 刮卡表面 canvas */
#scratchCanvas {
  position: absolute;
  inset: 0;
  z-index: 2;
  border-radius: 20px;
  touch-action: none;
}

/* 刮卡表面花紋（繪製到 canvas）*/

/* 進度條 */
.scratch-progress {
  width: 320px;
  margin: 0 auto 10px;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}
.scratch-progress-fill {
  height: 100%;
  background: var(--grad-gold);
  border-radius: 4px;
  transition: width 0.2s;
  width: 0%;
}

/* 提示文 */
.scratch-hint {
  text-align: center;
  font-size: 13px;
  color: var(--c-text-dim);
  margin-bottom: 20px;
  transition: all 0.3s;
}

/* 粒子容器 */
.scratch-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
  overflow: hidden;
}

/* 刮卡連刮導航 */
.card-nav {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
}
.card-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: all 0.3s;
}
.card-dot.active { background: var(--c-gold); box-shadow: 0 0 6px rgba(212,175,55,0.5); }
.card-dot.done { background: var(--c-rose); }

/* 結果文字 */
.win-text {
  text-align: center;
  font-size: 15px;
  line-height: 1.6;
  color: var(--c-text-dim);
  margin-top: 4px;
}
</style>
</head>
<body class="faisem-game">
<div class="scratch-page">

  <div class="game-topbar">
    <a href="/play/index.html" style="color:var(--c-text-dim);text-decoration:none;font-size:13px;">← 所有遊戲</a>
    <span class="logo">梵森女神</span>
    <span class="pts-badge" id="ptsBadge" style="display:none">✦ 0 點</span>
  </div>

  <div class="game-header">
    <h1 id="actName">女神刮刮樂</h1>
    <div class="sub" id="actDesc">用指尖喚醒女神的祝福</div>
  </div>

  <div class="meta-bar" id="metaBar" style="display:none">
    <span class="meta-tag gold" id="remainingTag" style="display:none"></span>
    <span class="countdown-tag" id="countdownTag" style="display:none"></span>
  </div>

  <!-- LINE ID -->
  <div style="padding: 0 20px 8px;">
    <input class="id-input" id="channelId" placeholder="LINE ID（選填）">
  </div>

  <!-- 開始按鈕區（抽獎前）-->
  <div id="beforeDraw" style="padding: 0 20px 20px;">
    <button class="btn-gold" id="drawBtn" onclick="startDraw()">✨ 喚醒女神祝福</button>
    <div class="err-msg" id="errMsg"></div>
  </div>

  <!-- 刮卡區（抽獎後）-->
  <div id="scratchZone" style="display:none; padding: 0 20px 16px;">
    <!-- 卡片進度 dots -->
    <div class="card-nav" id="cardNav" style="display:none"></div>

    <!-- 刮卡主體 -->
    <div class="scratch-wrap" id="scratchWrap">
      <div class="prize-bg" id="prizeBg">
        <div class="prize-emoji-big" id="prizeEmoji">✨</div>
        <div class="prize-name-reveal" id="prizeName"></div>
        <div class="prize-desc-reveal" id="prizeDesc"></div>
        <div class="prize-coupon-reveal" id="prizeCoupon"></div>
      </div>
      <canvas id="scratchCanvas" width="320" height="200"></canvas>
      <div class="scratch-particles" id="particleLayer"></div>
    </div>

    <!-- 進度條 -->
    <div class="scratch-progress">
      <div class="scratch-progress-fill" id="progressFill"></div>
    </div>

    <div class="scratch-hint" id="scratchHint">用手指刮開，看看女神給妳的驚喜</div>
    <div class="win-text" id="winText" style="display:none"></div>
  </div>

</div>

<!-- 中獎彈窗 -->
<div class="win-overlay" id="winModal">
  <div class="win-box">
    <div class="win-crown">✨</div>
    <div class="win-title">女神眷顧了妳！</div>
    <div class="win-subtitle">妳是被女神眷顧的人</div>
    <div class="win-prize-name" id="modalPrizeName"></div>
    <div class="win-coupon" id="modalCoupon" style="display:none"></div>
    <div class="share-section" id="shareBtnsWrap" style="display:none">
      <div class="share-hint">分享中獎 獲得 20 點女神獎勵</div>
      <div class="share-btns">
        <button class="share-btn share-line" onclick="doShare('line')">LINE</button>
        <button class="share-btn share-ig" onclick="doShare('ig')">IG</button>
        <button class="share-btn share-fb" onclick="doShare('fb')">FB</button>
      </div>
    </div>
    <button class="win-close" onclick="closeWinModal()">收下女神的禮物</button>
  </div>
</div>

<!-- 未中獎彈窗 -->
<div class="win-overlay" id="loseModal">
  <div class="lose-box">
    <div class="lose-moon">🌙</div>
    <div class="lose-title">下次更接近女神</div>
    <div class="lose-sub">妳已獲得 5 點安慰獎勵<br>每一次嘗試都讓女神更靠近妳</div>
    <button class="btn-rose" style="width:100%;" onclick="closeLoseModal()">繼續努力</button>
  </div>
</div>

<script type="module">
import { playSound, playWinSound, confetti, particleBurst, shareWin, openShareLink, vibrate, startCountdown, sleep } from '/play/_shared.js';

const params   = new URLSearchParams(location.search);
const actId    = params.get('activity_id');
let drawResult = null;
let revealed   = false;
let activityInfo = {};
let lastParticipationId = null;
let scratchCtx = null;
let painting   = false;

// ── 刮卡花紋繪製 ──
const initScratchSurface = () => {
  const canvas = document.getElementById('scratchCanvas');
  scratchCtx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // 底色漸層（玫瑰金）
  const grd = scratchCtx.createLinearGradient(0, 0, w, h);
  grd.addColorStop(0,   '#8B5E6E');
  grd.addColorStop(0.4, '#C4907A');
  grd.addColorStop(0.7, '#D4AF37');
  grd.addColorStop(1,   '#A0687A');
  scratchCtx.fillStyle = grd;
  scratchCtx.fillRect(0, 0, w, h);

  // 浮雕文字
  scratchCtx.save();
  scratchCtx.globalAlpha = 0.18;
  scratchCtx.fillStyle   = '#1a1a2e';
  scratchCtx.font        = 'bold 36px "PingFang TC", sans-serif';
  scratchCtx.textAlign   = 'center';
  scratchCtx.fillText('梵森女神', w / 2, h / 2 - 10);
  scratchCtx.font        = '14px "PingFang TC", sans-serif';
  scratchCtx.fillText('FAISEM', w / 2, h / 2 + 16);
  scratchCtx.restore();

  // 金色細格紋
  scratchCtx.save();
  scratchCtx.globalAlpha = 0.1;
  scratchCtx.strokeStyle = '#FFD700';
  scratchCtx.lineWidth   = 0.5;
  for (let x = 0; x < w; x += 20) {
    scratchCtx.beginPath(); scratchCtx.moveTo(x, 0); scratchCtx.lineTo(x, h); scratchCtx.stroke();
  }
  for (let y = 0; y < h; y += 20) {
    scratchCtx.beginPath(); scratchCtx.moveTo(0, y); scratchCtx.lineTo(w, y); scratchCtx.stroke();
  }
  scratchCtx.restore();

  // 邊框
  scratchCtx.strokeStyle = 'rgba(212,175,55,0.6)';
  scratchCtx.lineWidth   = 2;
  scratchCtx.strokeRect(1, 1, w - 2, h - 2);
};

// ── 金色碎屑粒子 ──
const spawnParticle = (x, y) => {
  const layer = document.getElementById('particleLayer');
  for (let i = 0; i < 3; i++) {
    const p = document.createElement('div');
    const size = 2 + Math.random() * 4;
    const dx = (Math.random() - 0.5) * 40;
    const dy = -10 - Math.random() * 30;
    p.style.cssText = `
      position: absolute;
      left: ${x}px; top: ${y}px;
      width: ${size}px; height: ${size}px;
      border-radius: 50%;
      background: ${['#D4AF37','#FFD700','#E8B4A2'][Math.floor(Math.random() * 3)]};
      pointer-events: none;
      animation: none;
      transition: none;
    `;
    layer.appendChild(p);
    const kf = p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 },
    ], { duration: 500 + Math.random() * 300, easing: 'ease-out', fill: 'forwards' });
    kf.onfinish = () => p.remove();
  }
};

// ── 刮除邏輯 ──
const scratch = (x, y) => {
  if (!scratchCtx) return;
  scratchCtx.globalCompositeOperation = 'destination-out';
  scratchCtx.beginPath();
  scratchCtx.arc(x, y, 30, 0, Math.PI * 2);
  scratchCtx.fill();
  scratchCtx.globalCompositeOperation = 'source-over';
  spawnParticle(x, y);
  checkReveal();
};

const getPos = (e, canvas) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return [
    (e.clientX - rect.left) * scaleX,
    (e.clientY - rect.top) * scaleY,
  ];
};

const checkReveal = () => {
  if (revealed || !scratchCtx) return;
  const canvas = document.getElementById('scratchCanvas');
  const imgData = scratchCtx.getImageData(0, 0, canvas.width, canvas.height).data;
  let transparent = 0;
  for (let i = 3; i < imgData.length; i += 4) {
    if (imgData[i] < 128) transparent++;
  }
  const pct = transparent / (canvas.width * canvas.height);
  updateProgress(pct);

  if (pct > 0.6) {
    revealed = true;
    scratchCtx.clearRect(0, 0, canvas.width, canvas.height);
    onFullReveal();
  }
};

const updateProgress = (pct) => {
  document.getElementById('progressFill').style.width = `${Math.min(100, pct * 100)}%`;
};

const onFullReveal = async () => {
  document.getElementById('scratchHint').style.display = 'none';
  document.getElementById('scratchCanvas').style.display = 'none';

  if (drawResult?.won) {
    confetti(4000);
    playWinSound(activityInfo.sound_effect);
    vibrate([50, 50, 100]);
    const wt = document.getElementById('winText');
    wt.style.display = '';
    wt.innerHTML = `<span style="color:var(--c-gold)">妳是被女神眷顧的人 ✨</span>`;
    await sleep(600);
    showWinModal(drawResult.prize);
  } else {
    playSound('fail');
    const wt = document.getElementById('winText');
    wt.style.display = '';
    wt.textContent = '下次更接近女神 🌙';
    document.getElementById('prizeEmoji').textContent = '🌙';
    document.getElementById('prizeName').style.webkitTextFillColor = 'rgba(255,255,255,0.5)';
    document.getElementById('prizeName').style.backgroundImage = 'none';
    document.getElementById('prizeName').style.color = 'rgba(255,255,255,0.5)';
    await sleep(500);
    document.getElementById('loseModal').classList.add('show');
  }
};

// ── 事件監聽 ──
const bindScratch = () => {
  const canvas = document.getElementById('scratchCanvas');
  canvas.addEventListener('mousedown', e => { painting = true; scratch(...getPos(e, canvas)); });
  canvas.addEventListener('mousemove', e => { if (painting) scratch(...getPos(e, canvas)); });
  canvas.addEventListener('mouseup', () => { painting = false; });
  canvas.addEventListener('mouseleave', () => { painting = false; });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); painting = true; scratch(...getPos(e.touches[0], canvas)); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (painting) scratch(...getPos(e.touches[0], canvas)); }, { passive: false });
  canvas.addEventListener('touchend', () => { painting = false; });
};

// ── 載入活動 ──
const loadActivity = async () => {
  if (!actId) { document.getElementById('actName').textContent = '活動不存在'; return; }
  try {
    const r    = await fetch(`/api/play/${actId}/info`);
    const data = await r.json();
    if (!r.ok) {
      document.getElementById('actName').textContent = data.error || '活動不存在';
      document.getElementById('drawBtn').disabled = true;
      return;
    }
    activityInfo = data;
    document.getElementById('actName').textContent = data.name;
    document.getElementById('actDesc').textContent = data.config?.description || '用指尖喚醒女神的祝福';

    if (data.remaining_winners != null) {
      const t = document.getElementById('remainingTag');
      t.textContent = `剩餘 ${data.remaining_winners} 個名額`;
      t.style.display = '';
      document.getElementById('metaBar').style.display = '';
    }
    if (data.time_remaining_seconds != null) {
      const el = document.getElementById('countdownTag');
      el.style.display = '';
      document.getElementById('metaBar').style.display = '';
      startCountdown(data.time_remaining_seconds, el, () => {
        document.getElementById('drawBtn').disabled = true;
      });
    }
  } catch {
    document.getElementById('errMsg').textContent = '載入失敗';
  }
};

// ── 開始抽獎 ──
window.startDraw = async () => {
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  btn.textContent = '女神正在為妳選擇…';
  document.getElementById('errMsg').textContent = '';
  playSound('click');

  const channelId = document.getElementById('channelId').value.trim();
  try {
    const r    = await fetch(`/api/play/${actId}/draw`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel_user_id: channelId || null }),
    });
    const data = await r.json();
    if (!r.ok) {
      document.getElementById('errMsg').textContent = data.error || '抽獎失敗';
      btn.disabled = false;
      btn.textContent = '✨ 喚醒女神祝福';
      return;
    }

    drawResult = data;
    lastParticipationId = data.participation_id;

    // 設定獎品顯示
    if (data.won && data.prize) {
      document.getElementById('prizeEmoji').textContent = '✨';
      document.getElementById('prizeName').textContent  = data.prize.name;
      document.getElementById('prizeDesc').textContent  = data.prize.description || '恭喜獲得女神的祝福！';
      if (data.prize.coupon_code) {
        const c = document.getElementById('prizeCoupon');
        c.textContent  = '優惠碼：' + data.prize.coupon_code;
        c.style.display = '';
      }
    } else {
      document.getElementById('prizeEmoji').textContent = '🌙';
      document.getElementById('prizeName').textContent  = '銘謝惠顧';
      document.getElementById('prizeDesc').textContent  = '謝謝妳的參與，繼續加油！';
    }

    // 切換介面
    document.getElementById('beforeDraw').style.display = 'none';
    document.getElementById('scratchZone').style.display = '';

    // 初始化刮卡
    initScratchSurface();
    bindScratch();
    playSound('sparkle');
  } catch {
    document.getElementById('errMsg').textContent = '網路錯誤，請稍後再試';
    btn.disabled = false;
    btn.textContent = '✨ 喚醒女神祝福';
  }
};

// ── 彈窗 ──
const showWinModal = (prize) => {
  document.getElementById('modalPrizeName').textContent = prize.name;
  if (prize.coupon_code) {
    document.getElementById('modalCoupon').textContent   = '優惠碼：' + prize.coupon_code;
    document.getElementById('modalCoupon').style.display = '';
  }
  if (activityInfo.share_bonus_enabled) {
    document.getElementById('shareBtnsWrap').style.display = '';
  }
  document.getElementById('winModal').classList.add('show');
};

window.closeWinModal = () => {
  document.getElementById('winModal').classList.remove('show');
  if (lastParticipationId) {
    setTimeout(() => {
      location.href = `/feedback/activity.html?activity_id=${encodeURIComponent(actId)}&participation_id=${encodeURIComponent(lastParticipationId)}`;
    }, 600);
  }
};

window.closeLoseModal = () => {
  document.getElementById('loseModal').classList.remove('show');
  if (lastParticipationId) {
    setTimeout(() => {
      location.href = `/feedback/activity.html?activity_id=${encodeURIComponent(actId)}&participation_id=${encodeURIComponent(lastParticipationId)}`;
    }, 400);
  }
};

window.doShare = async (channel) => {
  if (!lastParticipationId) return;
  const channelId = document.getElementById('channelId').value.trim();
  const result    = await shareWin(lastParticipationId, channel, channelId || null);
  openShareLink(channel, '我在梵森刮到了女神的祝福！');
  if (result.ok) {
    document.querySelector('.share-hint').textContent = `已獲得 ${result.bonus_points} 點獎勵！`;
  }
};

loadActivity();
</script>
</body>
</html>
