<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>女神扭蛋 — 梵森</title>
<link rel="stylesheet" href="/play/_shared.css">
<style>
/* ── 扭蛋機專屬 ── */
.gacha-page { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }

/* 扭蛋機主體 */
.gacha-machine {
  width: 240px;
  margin: 0 auto 20px;
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* 玻璃球容器（3D perspective）*/
.machine-globe-wrap {
  perspective: 600px;
  margin-bottom: 0;
}
.machine-globe {
  width: 220px;
  height: 220px;
  margin: 0 auto;
  border-radius: 50%;
  background: radial-gradient(
    circle at 35% 35%,
    rgba(255,255,255,0.18) 0%,
    rgba(255,255,255,0.05) 40%,
    transparent 70%
  ),
  linear-gradient(135deg, #1e1235 0%, #2c1f3d 60%, #1a1a2e 100%);
  box-shadow:
    inset 0 0 60px rgba(183,110,121,0.2),
    inset -10px -10px 30px rgba(0,0,0,0.4),
    0 0 0 3px rgba(212,175,55,0.4),
    0 0 40px rgba(212,175,55,0.2),
    0 8px 40px rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.3s;
}
.machine-globe:hover { transform: translateY(-4px) scale(1.02); }
.machine-globe:active { transform: scale(0.97); }

/* 玻璃高光 */
.machine-globe::before {
  content: '';
  position: absolute;
  top: 15%;
  left: 18%;
  width: 42%;
  height: 32%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.22) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.machine-globe::after {
  content: '';
  position: absolute;
  bottom: 12%;
  right: 12%;
  width: 25%;
  height: 18%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

/* 球內蛋蛋 */
.egg-inner {
  width: 110px;
  height: 130px;
  border-radius: 55px 55px 55px 55px / 65px 65px 55px 55px;
  background: linear-gradient(160deg,
    #E8B4A2 0%,
    #D4AF37 30%,
    #B76E79 60%,
    #9b5e6e 100%
  );
  box-shadow:
    inset -8px -8px 20px rgba(0,0,0,0.3),
    inset 4px 4px 12px rgba(255,255,255,0.15),
    0 4px 20px rgba(183,110,121,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.4s;
  cursor: pointer;
}

/* 蛋蛋分隔線 */
.egg-line {
  position: absolute;
  top: 50%;
  left: 10%;
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transform: translateY(-50%);
  pointer-events: none;
}

/* 蛋蛋文字 */
.egg-label {
  font-family: "PingFang TC", serif;
  font-size: 22px;
  font-weight: 800;
  color: rgba(255,255,255,0.85);
  text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  line-height: 1;
}

/* 機台底座 */
.machine-base {
  width: 220px;
  height: 50px;
  margin: -4px auto 0;
  background: linear-gradient(135deg, #2c1f3d, #1a1a2e);
  border-radius: 0 0 20px 20px;
  border: 2px solid rgba(212,175,55,0.3);
  border-top: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

/* 搖桿 */
.machine-handle {
  width: 32px;
  height: 44px;
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.handle-rod {
  width: 8px;
  height: 36px;
  background: linear-gradient(180deg, #D4AF37, #B8860B);
  border-radius: 4px;
  margin: 0 auto;
  box-shadow: 0 2px 8px rgba(212,175,55,0.4);
  transform-origin: bottom center;
  transition: transform 0.15s;
}
.handle-knob {
  width: 20px;
  height: 20px;
  background: radial-gradient(circle at 35% 35%, #E8B4A2, #B76E79);
  border-radius: 50%;
  margin: -4px auto 0;
  box-shadow: 0 2px 8px rgba(183,110,121,0.5), inset 0 1px 2px rgba(255,255,255,0.2);
}
.machine-handle.pull .handle-rod { transform: rotate(-30deg); }
.machine-handle.pull-back .handle-rod { transform: rotate(20deg); }

/* 開蛋動畫 */
.egg-top {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 50%;
  border-radius: 55px 55px 0 0;
  background: linear-gradient(160deg, #E8C4A2 0%, #D4AF37 100%);
  transform-origin: bottom center;
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: inset -4px -4px 12px rgba(0,0,0,0.2);
}
.egg-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 50%;
  border-radius: 0 0 55px 55px;
  background: linear-gradient(160deg, #B76E79 0%, #8B5265 100%);
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: inset 4px 4px 12px rgba(0,0,0,0.3);
}
.egg-open .egg-top    { transform: translateY(-60px) rotate(-20deg); }
.egg-open .egg-bottom { transform: translateY(40px); }

/* 開蛋後光芒 */
.egg-burst {
  position: absolute;
  inset: -20px;
  background: radial-gradient(circle, rgba(255,215,0,0.6) 0%, rgba(232,180,162,0.3) 40%, transparent 70%);
  opacity: 0;
  animation: none;
  pointer-events: none;
  border-radius: 50%;
}
.egg-burst.show { animation: burst-glow 0.8s ease-out forwards; }
@keyframes burst-glow {
  0%   { opacity: 0; transform: scale(0.5); }
  50%  { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1.5); }
}

/* 獎品飄出 */
.prize-reveal {
  display: none;
  text-align: center;
  padding: 16px;
  animation: fade-in-up 0.6s ease;
}
.prize-reveal.show { display: block; }
.prize-icon { font-size: 60px; margin-bottom: 10px; }
.prize-name-text {
  font-size: 20px;
  font-weight: 800;
  font-family: "PingFang TC", "Noto Serif TC", serif;
  background: linear-gradient(135deg, #D4AF37, #E8B4A2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.prize-desc-text { font-size: 13px; color: rgba(255,255,255,0.55); }
.prize-coupon-text {
  font-size: 18px; font-weight: 800; color: #D4AF37;
  letter-spacing: 2px;
  background: rgba(212,175,55,0.1);
  border: 1px dashed rgba(212,175,55,0.4);
  border-radius: 8px;
  padding: 6px 14px;
  margin-top: 10px;
  display: inline-block;
}

/* 搖晃動畫 */
@keyframes shake {
  0%, 100% { transform: rotate(0deg) scale(1); }
  15%       { transform: rotate(-12deg) scale(1.05); }
  30%       { transform: rotate(12deg) scale(1.05); }
  45%       { transform: rotate(-8deg); }
  60%       { transform: rotate(8deg); }
  75%       { transform: rotate(-4deg); }
  90%       { transform: rotate(4deg); }
}
.egg-shake { animation: shake 0.6s ease-in-out; }

/* 投幣提示 */
.coin-hint {
  text-align: center;
  font-size: 14px;
  color: var(--c-gold);
  margin-bottom: 16px;
  opacity: 0.8;
}

/* 滾出動畫 */
@keyframes roll-out {
  0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
  100% { transform: translate(0, 80px) rotate(360deg); opacity: 0; }
}
</style>
</head>
<body class="faisem-game">
<div class="gacha-page">

  <div class="game-topbar">
    <a href="/play/index.html" style="color:var(--c-text-dim);text-decoration:none;font-size:13px;">← 所有遊戲</a>
    <span class="logo">梵森女神</span>
    <span class="pts-badge" id="ptsBadge" style="display:none">✦ 0 點</span>
  </div>

  <div class="game-header">
    <h1 id="actName">女神扭蛋</h1>
    <div class="sub" id="actDesc">轉動命運的把手，看看女神給妳什麼驚喜</div>
  </div>

  <div class="meta-bar" id="metaBar" style="display:none">
    <span class="meta-tag gold" id="remainingTag" style="display:none"></span>
    <span class="countdown-tag" id="countdownTag" style="display:none"></span>
  </div>

  <div style="padding: 0 20px 8px;">
    <input class="id-input" id="channelId" placeholder="LINE ID（選填）">
  </div>

  <!-- 扭蛋機 -->
  <div class="gacha-machine" id="gachaMachine">
    <div class="machine-globe-wrap">
      <div class="machine-globe" id="globeEl" onclick="draw()">
        <!-- 蛋蛋 -->
        <div class="egg-inner" id="eggInner">
          <div class="egg-top" id="eggTop"></div>
          <div class="egg-line"></div>
          <div class="egg-bottom" id="eggBottom"></div>
          <div class="egg-label" id="eggLabel">✦</div>
          <div class="egg-burst" id="eggBurst"></div>
        </div>
      </div>
    </div>

    <div class="machine-base">
      <div class="machine-handle" id="handleEl" onclick="draw()">
        <div class="handle-rod" id="handleRod"></div>
        <div class="handle-knob"></div>
      </div>
      <span style="font-size:13px;color:var(--c-text-dim);font-weight:600;">點此轉動</span>
    </div>
  </div>

  <!-- 獎品展示 -->
  <div class="prize-reveal" id="prizeReveal">
    <div class="prize-icon" id="prizeIcon">✨</div>
    <div class="prize-name-text" id="prizeNameText"></div>
    <div class="prize-desc-text" id="prizeDescText"></div>
    <div class="prize-coupon-text" id="prizeCouponText" style="display:none"></div>
  </div>

  <!-- 按鈕區 -->
  <div style="padding: 0 20px;">
    <button class="btn-gold" id="drawBtn" onclick="draw()">扭出女神的禮物</button>
    <div class="err-msg" id="errMsg"></div>
  </div>

</div>

<!-- 中獎彈窗 -->
<div class="win-overlay" id="winModal">
  <div class="win-box">
    <div class="win-crown">✨</div>
    <div class="win-title">女神為妳送出禮物！</div>
    <div class="win-subtitle">命運之輪轉向了妳</div>
    <div class="win-prize-name" id="modalPrizeName"></div>
    <div class="win-coupon" id="modalCoupon" style="display:none"></div>
    <div class="share-section" id="shareBtnsWrap" style="display:none">
      <div class="share-hint">分享中獎 獲得 20 點女神獎勵</div>
      <div class="share-btns">
        <button class="share-btn share-line" onclick="doShare('line')">LINE</button>
        <button class="share-btn share-ig" onclick="doShare('ig')">IG</button>
        <button class="share-btn share-fb" onclick="doShare('fb')">FB</button>
      </div>
    </div>
    <button class="win-close" onclick="closeWinModal()">珍藏禮物</button>
  </div>
</div>

<!-- 未中獎彈窗 -->
<div class="win-overlay" id="loseModal">
  <div class="lose-box">
    <div class="lose-moon">🌙</div>
    <div class="lose-title">下次更接近女神</div>
    <div class="lose-sub">妳已獲得 5 點安慰獎勵<br>每一顆蛋裡都藏著可能</div>
    <button class="btn-rose" style="width:100%;" onclick="closeLoseModal()">繼續努力</button>
  </div>
</div>

<script type="module">
import { playSound, playWinSound, confetti, particleBurst, shareWin, openShareLink, vibrate, startCountdown, sleep } from '/play/_shared.js';

const params = new URLSearchParams(location.search);
const actId  = params.get('activity_id');
let drawing  = false;
let activityInfo = {};
let lastParticipationId = null;

// ── 把手動畫 ──
const animateHandle = async () => {
  const h = document.getElementById('handleEl');
  h.classList.add('pull');
  playSound('click');
  await sleep(180);
  h.classList.remove('pull');
  h.classList.add('pull-back');
  await sleep(180);
  h.classList.remove('pull-back');
};

// ── 蛋蛋搖晃 ──
const animateEggShake = async () => {
  const egg = document.getElementById('eggInner');
  const globe = document.getElementById('globeEl');

  // 搖晃 3 次
  for (let i = 0; i < 3; i++) {
    egg.style.animation = 'none';
    egg.offsetHeight; // reflow
    egg.style.animation = 'shake 0.5s ease-in-out';
    playSound('tick');
    await sleep(500);
  }
  egg.style.animation = '';
};

// ── 蛋蛋開啟動畫 ──
const animateEggOpen = async (won) => {
  const eggInner = document.getElementById('eggInner');
  eggInner.classList.add('egg-open');
  document.getElementById('eggLabel').style.opacity = '0';

  await sleep(400);

  // 光芒爆炸
  const burst = document.getElementById('eggBurst');
  burst.classList.add('show');

  if (won) {
    const rect = eggInner.getBoundingClientRect();
    particleBurst(
      rect.left + rect.width / 2,
      rect.top + rect.height / 2,
      45
    );
    confetti(4000);
  }

  await sleep(600);

  // 隱藏蛋機，顯示獎品
  document.getElementById('gachaMachine').style.opacity = '0';
  document.getElementById('gachaMachine').style.transition = 'opacity 0.4s';
  await sleep(400);
  document.getElementById('gachaMachine').style.display = 'none';
};

// ── 載入活動 ──
const loadActivity = async () => {
  if (!actId) { document.getElementById('actName').textContent = '活動不存在'; return; }
  try {
    const r    = await fetch(`/api/play/${actId}/info`);
    const data = await r.json();
    if (!r.ok) {
      document.getElementById('actName').textContent = data.error || '活動不存在';
      document.getElementById('drawBtn').disabled = true;
      return;
    }
    activityInfo = data;
    document.getElementById('actName').textContent = data.name;
    document.getElementById('actDesc').textContent = data.config?.description || '轉動命運的把手，看看女神給妳什麼驚喜';

    if (data.remaining_winners != null) {
      const t = document.getElementById('remainingTag');
      t.textContent = `剩餘 ${data.remaining_winners} 個名額`;
      t.style.display = '';
      document.getElementById('metaBar').style.display = '';
    }
    if (data.time_remaining_seconds != null) {
      const el = document.getElementById('countdownTag');
      el.style.display = '';
      document.getElementById('metaBar').style.display = '';
      startCountdown(data.time_remaining_seconds, el, () => {
        document.getElementById('drawBtn').disabled = true;
      });
    }
  } catch {
    document.getElementById('errMsg').textContent = '載入失敗';
  }
};

// ── 主抽獎邏輯 ──
window.draw = async () => {
  if (drawing) return;
  drawing = true;
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  btn.textContent = '女神正在選禮物…';
  document.getElementById('errMsg').textContent = '';
  document.getElementById('globeEl').style.pointerEvents = 'none';

  // 把手動畫
  await animateHandle();
  vibrate([30, 20, 30]);

  const channelId = document.getElementById('channelId').value.trim();
  try {
    const r    = await fetch(`/api/play/${actId}/draw`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel_user_id: channelId || null }),
    });
    const data = await r.json();

    if (!r.ok) {
      document.getElementById('errMsg').textContent = data.error || '抽獎失敗';
      btn.disabled = false;
      btn.textContent = '扭出女神的禮物';
      document.getElementById('globeEl').style.pointerEvents = '';
      drawing = false;
      return;
    }

    lastParticipationId = data.participation_id;

    // 蛋蛋搖晃
    await animateEggShake();

    // 開蛋
    await animateEggOpen(data.won);

    // 展示獎品
    const reveal = document.getElementById('prizeReveal');
    if (data.won && data.prize) {
      document.getElementById('prizeIcon').textContent    = '✨';
      document.getElementById('prizeNameText').textContent = data.prize.name;
      document.getElementById('prizeDescText').textContent = data.prize.description || '恭喜獲得女神的祝福！';
      if (data.prize.coupon_code) {
        const c = document.getElementById('prizeCouponText');
        c.textContent  = '優惠碼：' + data.prize.coupon_code;
        c.style.display = '';
      }
      reveal.classList.add('show');
      playWinSound(activityInfo.sound_effect);
      vibrate([50, 50, 100]);
      await sleep(800);
      showWinModal(data.prize);
    } else {
      document.getElementById('prizeIcon').textContent    = '🌙';
      document.getElementById('prizeNameText').textContent = '下次更接近女神';
      document.getElementById('prizeDescText').textContent = '謝謝妳的參與，繼續加油！';
      reveal.classList.add('show');
      btn.style.display = 'none';
      playSound('fail');
      await sleep(600);
      document.getElementById('loseModal').classList.add('show');
    }
  } catch {
    document.getElementById('errMsg').textContent = '網路錯誤，請稍後再試';
    btn.disabled = false;
    btn.textContent = '扭出女神的禮物';
    document.getElementById('globeEl').style.pointerEvents = '';
    drawing = false;
  }
};

// ── 彈窗 ──
const showWinModal = (prize) => {
  document.getElementById('modalPrizeName').textContent = prize.name;
  if (prize.coupon_code) {
    document.getElementById('modalCoupon').textContent   = '優惠碼：' + prize.coupon_code;
    document.getElementById('modalCoupon').style.display = '';
  }
  if (activityInfo.share_bonus_enabled) {
    document.getElementById('shareBtnsWrap').style.display = '';
  }
  document.getElementById('winModal').classList.add('show');
};

window.closeWinModal = () => {
  document.getElementById('winModal').classList.remove('show');
  if (lastParticipationId) {
    setTimeout(() => {
      location.href = `/feedback/activity.html?activity_id=${encodeURIComponent(actId)}&participation_id=${encodeURIComponent(lastParticipationId)}`;
    }, 600);
  }
};

window.closeLoseModal = () => {
  document.getElementById('loseModal').classList.remove('show');
  if (lastParticipationId) {
    setTimeout(() => {
      location.href = `/feedback/activity.html?activity_id=${encodeURIComponent(actId)}&participation_id=${encodeURIComponent(lastParticipationId)}`;
    }, 400);
  }
};

window.doShare = async (channel) => {
  if (!lastParticipationId) return;
  const channelId = document.getElementById('channelId').value.trim();
  const result    = await shareWin(lastParticipationId, channel, channelId || null);
  openShareLink(channel, '我在梵森扭到了女神的禮物！');
  if (result.ok) {
    document.querySelector('.share-hint').textContent = `已獲得 ${result.bonus_points} 點獎勵！`;
  }
};

loadActivity();
</script>
</body>
</html>
