<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>女神轉盤 — 梵森</title>
<link rel="stylesheet" href="/play/_shared.css">
<style>
/* ── 轉盤專屬 ── */
.wheel-page { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 32px; }

/* 轉盤容器 */
.wheel-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 20px 24px;
}

/* 外框裝飾 */
.wheel-outer {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 0 auto 24px;
  filter: drop-shadow(0 0 30px rgba(212,175,55,0.35));
}

/* 旋轉光暈環 */
.wheel-glow-ring {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    rgba(212,175,55,0.15),
    rgba(183,110,121,0.2),
    rgba(212,175,55,0.15),
    rgba(232,180,162,0.2),
    rgba(212,175,55,0.15)
  );
  animation: spin-slow 8s linear infinite;
}

/* 指針 */
.wheel-pointer {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 34px solid #D4AF37;
  filter: drop-shadow(0 3px 8px rgba(212,175,55,0.7));
}
.wheel-pointer::after {
  content: '';
  position: absolute;
  top: -36px;
  left: -8px;
  width: 16px;
  height: 16px;
  background: #FFD700;
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(255,215,0,0.8);
}

/* 轉盤 canvas */
#wheelCanvas {
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(212,175,55,0.4), 0 8px 40px rgba(0,0,0,0.5);
  display: block;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* 中心按鈕 */
.wheel-center-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a1a2e, #2c1f3d);
  border: 3px solid rgba(212,175,55,0.6);
  box-shadow: 0 0 20px rgba(212,175,55,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 15;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.wheel-center-btn:active { transform: translate(-50%, -50%) scale(0.92); }
.wheel-center-btn .center-text {
  font-size: 10px;
  font-weight: 700;
  color: var(--c-gold);
  text-align: center;
  line-height: 1.2;
  letter-spacing: 0.05em;
}

/* 底部操作區 */
.wheel-action {
  width: 100%;
  max-width: 340px;
  padding: 0 20px;
}

/* 中獎扇形閃光（疊加在 canvas 上）*/
.sector-flash {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  background: radial-gradient(circle, rgba(255,215,0,0.5) 0%, transparent 65%);
  transition: opacity 0.1s;
}
.sector-flash.show { opacity: 1; animation: flash-pulse 0.4s ease 3; }
@keyframes flash-pulse {
  0%, 100% { opacity: 0; } 50% { opacity: 1; }
}

/* 轉動中 tick 特效 */
.wheel-spinning #wheelCanvas {
  filter: blur(0px);
}

/* 標題區 */
.wheel-title { font-size: 13px; color: var(--c-text-dim); text-align: center; margin-bottom: 6px; }

/* 已抽提示 */
.drawn-hint {
  text-align: center;
  font-size: 14px;
  color: var(--c-text-dim);
  margin-top: 12px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
}
</style>
</head>
<body class="faisem-game">
<div class="wheel-page" id="pageWrap">

  <!-- 頂部 -->
  <div class="game-topbar">
    <a href="/play/index.html" style="color:var(--c-text-dim);text-decoration:none;font-size:13px;">← 所有遊戲</a>
    <span class="logo">梵森女神</span>
    <span class="pts-badge" id="ptsBadge" style="display:none">✦ 0 點</span>
  </div>

  <!-- 標題 -->
  <div class="game-header">
    <h1 id="actName">女神轉盤</h1>
    <div class="sub" id="actDesc">讓女神為妳指引方向</div>
  </div>

  <!-- Meta -->
  <div class="meta-bar" id="metaBar" style="display:none">
    <span class="meta-tag gold" id="remainingTag" style="display:none"></span>
    <span class="countdown-tag" id="countdownTag" style="display:none"></span>
  </div>

  <!-- LINE ID -->
  <div style="padding: 0 20px 4px;">
    <input class="id-input" id="channelId" placeholder="LINE ID（選填）">
  </div>

  <!-- 轉盤 -->
  <div class="wheel-section" id="wheelSpinning">
    <div class="wheel-outer" id="wheelOuter">
      <div class="wheel-glow-ring"></div>
      <div class="wheel-pointer"></div>
      <canvas id="wheelCanvas" width="300" height="300"></canvas>
      <div class="sector-flash" id="sectorFlash"></div>
      <div class="wheel-center-btn" id="centerBtn" onclick="draw()">
        <span class="center-text">✦<br>轉動</span>
      </div>
    </div>

    <div class="wheel-action">
      <button class="btn-gold" id="drawBtn" onclick="draw()">✨ 開始轉動</button>
      <div class="err-msg" id="errMsg"></div>
      <div class="drawn-hint" id="drawnHint" style="display:none"></div>
    </div>
  </div>

</div>

<!-- 中獎彈窗 -->
<div class="win-overlay" id="winModal">
  <div class="win-box">
    <div class="win-crown">✨</div>
    <div class="win-title">恭喜妳！</div>
    <div class="win-subtitle" id="winSubtitle">女神已為妳挑選了這份禮物</div>
    <div class="win-prize-name" id="modalPrizeName"></div>
    <div class="win-coupon" id="modalCoupon" style="display:none"></div>
    <div class="share-section" id="shareBtnsWrap" style="display:none">
      <div class="share-hint">分享中獎 獲得 20 點女神獎勵</div>
      <div class="share-btns">
        <button class="share-btn share-line" onclick="doShare('line')">LINE</button>
        <button class="share-btn share-ig" onclick="doShare('ig')">IG</button>
        <button class="share-btn share-fb" onclick="doShare('fb')">FB</button>
      </div>
    </div>
    <button class="win-close" onclick="closeWinModal()">收下禮物</button>
  </div>
</div>

<!-- 未中獎彈窗 -->
<div class="win-overlay" id="loseModal">
  <div class="lose-box">
    <div class="lose-moon">🌙</div>
    <div class="lose-title">下次更接近女神</div>
    <div class="lose-sub">每一次轉動都是與女神靠近的機會<br>妳已得到 5 點安慰獎勵</div>
    <button class="btn-rose" style="width:100%;" onclick="closeLoseModal()">繼續努力</button>
  </div>
</div>

<script type="module">
import { playSound, playWinSound, confetti, particleBurst, shareWin, openShareLink, vibrate, startCountdown, sleep } from '/play/_shared.js';

const params      = new URLSearchParams(location.search);
const actId       = params.get('activity_id');
let   prizes      = [];
let   spinDeg     = 0;
let   spinning    = false;
let   activityInfo = {};
let   lastParticipationId = null;

// ── 配色（梵森女神 5 色系）──
const SECTOR_COLORS = [
  { bg: '#2a1525', stroke: '#B76E79', text: '#E8B4A2' }, // 玫瑰暗
  { bg: '#1e1a10', stroke: '#D4AF37', text: '#FFD700' }, // 黃金暗
  { bg: '#1a1a2e', stroke: '#9b7bb5', text: '#d4b8f0' }, // 紫水晶
  { bg: '#1a1520', stroke: '#E8B4A2', text: '#FFDDD2' }, // 粉霧暗
  { bg: '#0f1a1a', stroke: '#7ec8c8', text: '#b8e8e8' }, // 琉璃暗
  { bg: '#1f1520', stroke: '#c9a4d4', text: '#e8d0f0' }, // 薰衣草
  { bg: '#1a1010', stroke: '#ff9999', text: '#ffd0d0' }, // 玫瑰紅
  { bg: '#101520', stroke: '#8ab4e8', text: '#c0d8f8' }, // 星藍
];

// ── 繪製轉盤 ──
const drawWheel = (rotateDeg = 0) => {
  const canvas = document.getElementById('wheelCanvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2, r = W / 2 - 6;
  ctx.clearRect(0, 0, W, H);

  if (!prizes.length) {
    // 佔位轉盤
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, '#2c1f3d');
    grad.addColorStop(1, '#1a1a2e');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = 'rgba(212,175,55,0.3)'; ctx.lineWidth = 3; ctx.stroke();
    return;
  }

  const n   = prizes.length;
  const arc = (2 * Math.PI) / n;
  const rot = rotateDeg * Math.PI / 180;

  // 扇形
  for (let i = 0; i < n; i++) {
    const start  = rot + i * arc;
    const end    = start + arc;
    const scheme = SECTOR_COLORS[i % SECTOR_COLORS.length];

    // 漸層底色
    const grd = ctx.createLinearGradient(
      cx + Math.cos(start + arc/2) * r * 0.3,
      cy + Math.sin(start + arc/2) * r * 0.3,
      cx + Math.cos(start + arc/2) * r,
      cy + Math.sin(start + arc/2) * r
    );
    grd.addColorStop(0, scheme.bg);
    grd.addColorStop(1, shadeColor(scheme.bg, 0.25));

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.strokeStyle = scheme.stroke;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 文字
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = scheme.text;
    ctx.font = `bold ${n > 6 ? 11 : 13}px "PingFang TC", "Noto Sans TC", sans-serif`;
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur  = 4;
    const label = prizes[i].name.length > 7 ? prizes[i].name.slice(0, 7) + '…' : prizes[i].name;
    ctx.fillText(label, r - 10, 4);
    ctx.restore();

    // 邊緣金光點
    const midAngle = start + arc / 2;
    const dotR = r - 8;
    ctx.beginPath();
    ctx.arc(
      cx + Math.cos(midAngle) * dotR,
      cy + Math.sin(midAngle) * dotR,
      3, 0, Math.PI * 2
    );
    ctx.fillStyle = scheme.stroke;
    ctx.fill();
  }

  // 中心圓底板
  const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 32);
  cGrad.addColorStop(0, '#2c1f3d');
  cGrad.addColorStop(1, '#1a1a2e');
  ctx.beginPath(); ctx.arc(cx, cy, 34, 0, Math.PI * 2);
  ctx.fillStyle = cGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(212,175,55,0.5)'; ctx.lineWidth = 2; ctx.stroke();
};

// 顏色輔助
const shadeColor = (hex, amount) => {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + Math.floor(amount * 80));
  const g = Math.min(255, ((num >> 8) & 0xff) + Math.floor(amount * 50));
  const b = Math.min(255, (num & 0xff) + Math.floor(amount * 60));
  return `rgb(${r},${g},${b})`;
};

// ── 旋轉動畫（ease-out cubic-bezier）──
const animateSpin = (targetAngle) => new Promise(resolve => {
  const DURATION  = 4200;
  const FULL_SPIN = 360 * 6;
  const start     = performance.now();
  const startDeg  = spinDeg;
  const total     = FULL_SPIN + targetAngle;
  let   lastTick  = 0;

  const animate = (now) => {
    const elapsed = now - start;
    const t       = Math.min(elapsed / DURATION, 1);
    // ease-out quart
    const eased   = 1 - Math.pow(1 - t, 4);
    const current = startDeg + total * eased;

    // tick 音效
    const speed = (current - (startDeg + total * (1 - Math.pow(1 - Math.max(0, t - 0.001) / 1, 4)))) * 0;
    const tickInterval = Math.max(30, 180 * t * t);
    if (now - lastTick > tickInterval) { playSound('tick'); lastTick = now; }

    drawWheel(current);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      spinDeg = current % 360;
      resolve();
    }
  };
  requestAnimationFrame(animate);
});

// ── 載入活動 ──
const loadActivity = async () => {
  if (!actId) { document.getElementById('actName').textContent = '活動不存在'; return; }
  try {
    const r    = await fetch(`/api/play/${actId}/info`);
    const data = await r.json();
    if (!r.ok) {
      document.getElementById('actName').textContent = data.error || '活動不存在';
      document.getElementById('drawBtn').disabled = true;
      return;
    }
    activityInfo = data;
    document.getElementById('actName').textContent  = data.name;
    document.getElementById('actDesc').textContent  = data.config?.description || '讓女神為妳轉出專屬禮物';
    prizes = data.prizes || [];
    drawWheel(0);

    if (data.remaining_winners != null) {
      const t = document.getElementById('remainingTag');
      t.textContent = `剩餘 ${data.remaining_winners} 個名額`;
      t.style.display = '';
      document.getElementById('metaBar').style.display = '';
    }
    if (data.time_remaining_seconds != null) {
      const el = document.getElementById('countdownTag');
      el.style.display = '';
      document.getElementById('metaBar').style.display = '';
      startCountdown(data.time_remaining_seconds, el, () => {
        document.getElementById('drawBtn').disabled = true;
      });
    }
  } catch {
    document.getElementById('errMsg').textContent = '載入失敗，請重新整理';
  }
};

// ── 抽獎 ──
window.draw = async () => {
  if (spinning) return;
  spinning = true;
  playSound('click');
  vibrate([20]);

  const btn = document.getElementById('drawBtn');
  const centerBtn = document.getElementById('centerBtn');
  btn.disabled = true;
  centerBtn.style.pointerEvents = 'none';
  document.getElementById('errMsg').textContent = '';

  const channelId = document.getElementById('channelId').value.trim();

  try {
    const r    = await fetch(`/api/play/${actId}/draw`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel_user_id: channelId || null }),
    });
    const data = await r.json();

    if (!r.ok) {
      document.getElementById('errMsg').textContent = data.error || '抽獎失敗，請稍後再試';
      spinning = false;
      btn.disabled = false;
      centerBtn.style.pointerEvents = '';
      return;
    }

    lastParticipationId = data.participation_id;

    // 計算停止角度
    let targetAngle = 0;
    if (data.won && data.prize) {
      const idx = prizes.findIndex(p => p.id === data.prize.id);
      if (idx >= 0) {
        const arc = 360 / prizes.length;
        // 指針在頂部（-90度），扇形從右（0度）開始
        targetAngle = 360 - (idx * arc + arc / 2) - 90;
        if (targetAngle < 0) targetAngle += 360;
      }
    } else {
      // 非中獎：停在不是第一個獎的位置
      const arc = 360 / Math.max(prizes.length, 1);
      const safeIdx = prizes.length > 1 ? Math.floor(prizes.length / 2) : 0;
      targetAngle = 360 - (safeIdx * arc + arc / 2) - 90;
      if (targetAngle < 0) targetAngle += 360;
      targetAngle += (Math.random() - 0.5) * arc * 0.8;
    }

    await animateSpin(targetAngle);

    // 中獎後閃光
    if (data.won) {
      const flash = document.getElementById('sectorFlash');
      flash.classList.add('show');
      setTimeout(() => flash.classList.remove('show'), 1200);
      particleBurst(
        document.getElementById('wheelCanvas').getBoundingClientRect().left + 150,
        document.getElementById('wheelCanvas').getBoundingClientRect().top + 150,
        50
      );
      confetti(4000);
      playWinSound(activityInfo.sound_effect);
      vibrate([50, 50, 100]);
      await sleep(600);
      showWinModal(data.prize);
    } else {
      await sleep(400);
      document.getElementById('loseModal').classList.add('show');
      playSound('fail');
    }

    document.getElementById('drawnHint').style.display = '';
    document.getElementById('drawnHint').textContent = '已完成本次抽獎';

  } catch {
    document.getElementById('errMsg').textContent = '網路錯誤，請稍後再試';
    spinning = false;
    btn.disabled = false;
    centerBtn.style.pointerEvents = '';
  }
};

// ── 彈窗 ──
const showWinModal = (prize) => {
  document.getElementById('modalPrizeName').textContent = prize.name;
  if (prize.coupon_code) {
    document.getElementById('modalCoupon').textContent  = '優惠碼：' + prize.coupon_code;
    document.getElementById('modalCoupon').style.display = '';
  }
  if (activityInfo.share_bonus_enabled) {
    document.getElementById('shareBtnsWrap').style.display = '';
  }
  document.getElementById('winModal').classList.add('show');
};

window.closeWinModal = () => {
  document.getElementById('winModal').classList.remove('show');
  if (lastParticipationId) {
    setTimeout(() => {
      location.href = `/feedback/activity.html?activity_id=${encodeURIComponent(actId)}&participation_id=${encodeURIComponent(lastParticipationId)}`;
    }, 600);
  }
};

window.closeLoseModal = () => {
  document.getElementById('loseModal').classList.remove('show');
  if (lastParticipationId) {
    setTimeout(() => {
      location.href = `/feedback/activity.html?activity_id=${encodeURIComponent(actId)}&participation_id=${encodeURIComponent(lastParticipationId)}`;
    }, 400);
  }
};

window.doShare = async (channel) => {
  if (!lastParticipationId) return;
  const channelId = document.getElementById('channelId').value.trim();
  const result    = await shareWin(lastParticipationId, channel, channelId || null);
  openShareLink(channel, `我在梵森女神轉盤獲得了超棒的獎品！`);
  if (result.ok) {
    document.querySelector('.share-hint').textContent = `已獲得 ${result.bonus_points} 點女神獎勵！`;
    playSound('coin');
  }
};

loadActivity();
</script>
</body>
</html>
