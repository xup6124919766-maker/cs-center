<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中獎排行榜</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; padding: 20px; color: #fff; }
  .container { max-width: 480px; margin: 0 auto; }
  h1 { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .sub { text-align: center; color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 24px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 4px; }
  .tab { flex: 1; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
  .tab.active { background: rgba(255,255,255,0.2); }
  /* 前三名 */
  .top3 { display: flex; justify-content: center; align-items: flex-end; gap: 12px; margin-bottom: 24px; }
  .top3-item { text-align: center; }
  .top3-item.rank1 { order: 2; }
  .top3-item.rank2 { order: 1; }
  .top3-item.rank3 { order: 3; }
  .podium { border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; width: 70px; margin: 0 auto 6px; }
  .top3-item.rank1 .podium { background: linear-gradient(135deg, #f7d154, #e67e22); height: 90px; font-size: 40px; }
  .top3-item.rank2 .podium { background: linear-gradient(135deg, #b0b0b0, #888); height: 70px; }
  .top3-item.rank3 .podium { background: linear-gradient(135deg, #cd7f32, #a0522d); height: 60px; }
  .top3-name { font-size: 13px; font-weight: 600; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .top3-count { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .rank-badge { font-size: 16px; margin-bottom: 4px; }
  /* 其餘排行 */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .row { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .rank-no { font-size: 18px; font-weight: 700; width: 28px; text-align: center; color: rgba(255,255,255,0.5); }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .info { flex: 1; min-width: 0; }
  .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .detail { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .wins { font-size: 16px; font-weight: 700; color: #f7d154; }
  .empty { text-align: center; padding: 40px; color: rgba(255,255,255,0.4); }
  .activity-selector { margin-bottom: 16px; }
  .activity-selector select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 14px; }
  .activity-selector select option { background: #1a1a2e; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <h1>中獎排行榜</h1>
  <div class="sub">看看誰是最幸運的人！</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('global', this)">全店排行</div>
    <div class="tab" onclick="switchTab('activity', this)">活動排行</div>
  </div>

  <div id="globalTab">
    <div id="globalList" class="list"></div>
  </div>

  <div id="activityTab" style="display:none">
    <div class="activity-selector">
      <select id="actSelect" onchange="loadActivityLeaderboard()">
        <option value="">-- 選擇活動 --</option>
      </select>
    </div>
    <div id="activityList" class="list"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const clientId = params.get('client_id') || '1';

const switchTab = (tab, el) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('globalTab').style.display = tab === 'global' ? '' : 'none';
  document.getElementById('activityTab').style.display = tab === 'activity' ? '' : 'none';
  if (tab === 'activity') loadActivities();
};

const renderAvatar = (row) => {
  if (row.avatar_url) return `<img src="${row.avatar_url}" onerror="this.style.display='none';this.parentElement.textContent='👤'" alt="">`;
  return '👤';
};

const renderTop3 = (list, container, keyWins, keyName) => {
  const top3 = list.slice(0, 3);
  if (top3.length < 1) return;
  const items = [
    top3[0] ? `<div class="top3-item rank1"><div class="rank-badge">1</div><div class="podium">${renderAvatar(top3[0])}</div><div class="top3-name">${esc(top3[0][keyName] || '匿名')}</div><div class="top3-count">${top3[0][keyWins]} 次</div></div>` : '',
    top3[1] ? `<div class="top3-item rank2"><div class="rank-badge">2</div><div class="podium" style="font-size:28px">${renderAvatar(top3[1])}</div><div class="top3-name">${esc(top3[1][keyName] || '匿名')}</div><div class="top3-count">${top3[1][keyWins]} 次</div></div>` : '',
    top3[2] ? `<div class="top3-item rank3"><div class="rank-badge">3</div><div class="podium" style="font-size:24px">${renderAvatar(top3[2])}</div><div class="top3-name">${esc(top3[2][keyName] || '匿名')}</div><div class="top3-count">${top3[2][keyWins]} 次</div></div>` : '',
  ];
  container.innerHTML = `<div class="top3">${items.join('')}</div>`;
};

const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const ts2label = (ts) => {
  if (!ts) return '';
  const d = Math.floor((Date.now() - ts) / 86400000);
  return d === 0 ? '今天' : `${d} 天前`;
};

const loadGlobal = async () => {
  const container = document.getElementById('globalList');
  container.innerHTML = '<div class="empty">載入中…</div>';
  try {
    const r = await fetch(`/api/play/leaderboard/global?client_id=${clientId}&limit=20`);
    const data = await r.json();
    const list = data.leaderboard || [];
    if (!list.length) { container.innerHTML = '<div class="empty">尚無中獎紀錄</div>'; return; }

    let html = '';
    if (list.length >= 1) {
      // Top 3 podium
      const top3 = list.slice(0, 3);
      html += '<div class="top3">';
      const orders = [top3[1], top3[0], top3[2]];
      const ranks = [2, 1, 3];
      const heights = ['70px','90px','60px'];
      const sizes = ['28px','40px','24px'];
      orders.forEach((item, i) => {
        if (!item) return;
        html += `<div class="top3-item rank${ranks[i]}">
          <div class="rank-badge">${ranks[i]}</div>
          <div class="podium" style="height:${heights[i]};font-size:${sizes[i]}">${renderAvatar(item)}</div>
          <div class="top3-name">${esc(item.customer_name || '匿名')}</div>
          <div class="top3-count">${item.total_wins} 次中獎</div>
        </div>`;
      });
      html += '</div>';
    }

    // 4名以後
    list.slice(3).forEach((item, idx) => {
      html += `<div class="row">
        <div class="rank-no">${idx + 4}</div>
        <div class="avatar">${renderAvatar(item)}</div>
        <div class="info">
          <div class="name">${esc(item.customer_name || '匿名')}</div>
          <div class="detail">參與 ${item.activities_count} 場活動 · 最近 ${ts2label(item.last_win_at)}</div>
        </div>
        <div class="wins">${item.total_wins}</div>
      </div>`;
    });

    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<div class="empty">載入失敗</div>';
  }
};

const loadActivities = async () => {
  try {
    const r = await fetch(`/api/games?client_id=${clientId}`);
    const data = await r.json();
    const sel = document.getElementById('actSelect');
    const current = sel.value;
    sel.innerHTML = '<option value="">-- 選擇活動 --</option>';
    (data.activities || []).forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = `${a.name} (${a.status})`;
      if (String(a.id) === current) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch {}
};

const loadActivityLeaderboard = async () => {
  const actId = document.getElementById('actSelect').value;
  const container = document.getElementById('activityList');
  if (!actId) { container.innerHTML = ''; return; }
  container.innerHTML = '<div class="empty">載入中…</div>';
  try {
    const r = await fetch(`/api/play/leaderboard/${actId}?limit=20`);
    const data = await r.json();
    const list = data.leaderboard || [];
    if (!list.length) { container.innerHTML = '<div class="empty">此活動尚無中獎紀錄</div>'; return; }

    let html = '';
    list.forEach((item, idx) => {
      const rankEmoji = idx === 0 ? '' : idx === 1 ? '' : idx === 2 ? '' : '';
      html += `<div class="row">
        <div class="rank-no">${idx < 3 ? rankEmoji || (idx+1) : idx+1}</div>
        <div class="avatar">${renderAvatar(item)}</div>
        <div class="info">
          <div class="name">${esc(item.customer_name || item.channel_user_id || '匿名')}</div>
          <div class="detail">${esc(item.prize_name || '—')} · ${ts2label(item.created_at)}</div>
        </div>
      </div>`;
    });
    container.innerHTML = html;
  } catch {
    container.innerHTML = '<div class="empty">載入失敗</div>';
  }
};

loadGlobal();
</script>
</body>
</html>
