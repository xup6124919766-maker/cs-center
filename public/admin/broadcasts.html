<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廣播推播 — 客服中心</title>
<link rel="stylesheet" href="/styles.css">
<style>
  body { font-family: system-ui, sans-serif; background: #f5f5f7; margin: 0; }
  .topnav { background: #1a1a2e; color: #fff; padding: 0 20px; display: flex; align-items: center; gap: 16px; height: 48px; font-size: 14px; }
  .topnav a { color: #ccc; text-decoration: none; padding: 4px 8px; border-radius: 4px; }
  .topnav a:hover, .topnav a.active { color: #fff; background: rgba(255,255,255,0.1); }
  .topnav .brand { font-weight: 700; color: #fff; margin-right: 8px; }
  .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
  .btn-primary { background: #5856d6; color: #fff; }
  .btn-green { background: #34c759; color: #fff; }
  .btn-red { background: #ff3b30; color: #fff; }
  .btn-gray { background: #e5e5ea; color: #333; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
  .badge-draft { background: #e5e5ea; color: #666; }
  .badge-scheduled { background: #fff3cd; color: #856404; }
  .badge-sending { background: #cce5ff; color: #004085; }
  .badge-sent { background: #d1f7e0; color: #1b7c3e; }
  .badge-failed { background: #ffe0e0; color: #b00; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
  th { color: #666; font-weight: 500; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.single { grid-template-columns: 1fr; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 580px; width: 90%; max-height: 90vh; overflow-y: auto; margin: 40px auto; }
  #msg { padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; display: none; font-size: 14px; }
  #msg.ok { background: #d1f7e0; color: #1b7c3e; display: block; }
  #msg.err { background: #ffe0e0; color: #b00; display: block; }
  .stats-bar { height: 12px; background: #e5e5ea; border-radius: 6px; margin: 4px 0; overflow: hidden; }
  .stats-bar div { height: 100%; background: #5856d6; border-radius: 6px; transition: width 0.3s; }
</style>
</head>
<body>
<nav class="topnav">
  <span class="brand">CS Hub</span>
  <a href="/dashboard.html">首頁</a>
  <a href="/index.html">客服</a>
  <a href="/knowledge.html">知識庫</a>
  <a href="/admin/games.html">活動</a>
  <a href="/admin/broadcasts.html" class="active">廣播</a>
  <a href="/admin/ab-tests.html">A/B Test</a>
  <a href="/admin/ecommerce.html">訂單</a>
  <a href="/admin/rich-menus.html">圖文選單</a>
  <a href="/admin/journeys.html">旅程</a>
  <a href="/admin/analytics.html">報表</a>
  <a href="/admin.html">設定</a>
</nav>

<div class="container">
  <div id="msg"></div>
  <div class="card" style="display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;gap:8px;align-items:center">
      <h2 style="margin:0">廣播推播</h2>
      <select id="statusFilter" onchange="load()" style="width:auto;padding:4px 8px;font-size:13px">
        <option value="">全部</option>
        <option value="draft">草稿</option>
        <option value="scheduled">已排程</option>
        <option value="sent">已送出</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="openCreate()">+ 新增廣播</button>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>名稱</th><th>通道</th><th>狀態</th><th>目標人數</th><th>已送</th><th>A/B Test</th><th>操作</th></tr></thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">新增廣播</h3>
    <div class="form-row">
      <div><label>名稱</label><input id="f_name" placeholder="五月促銷通知"></div>
      <div><label>通道</label>
        <select id="f_channel">
          <option value="line">LINE</option>
          <option value="fb">Facebook</option>
          <option value="all">全部</option>
        </select>
      </div>
    </div>
    <div class="form-row single">
      <div><label>訊息內容</label><textarea id="f_content" rows="4" placeholder="親愛的顧客，..."></textarea></div>
    </div>
    <div class="card" style="background:#f8f8f8;padding:12px;margin-bottom:12px">
      <strong style="font-size:13px">分眾條件（可選）</strong>
      <div class="form-row" style="margin-top:8px">
        <div><label>標籤（逗號分隔）</label><input id="f_tags" placeholder="VIP, 潛力客"></div>
        <div><label>情緒</label>
          <select id="f_emotion" multiple style="height:60px">
            <option value="positive">positive</option>
            <option value="neutral">neutral</option>
            <option value="negative">negative</option>
            <option value="angry">angry</option>
          </select>
        </div>
      </div>
      <div style="margin-top:8px">
        <button class="btn btn-gray" style="font-size:12px;padding:4px 8px" onclick="preview()">預覽符合人數</button>
        <span id="previewResult" style="font-size:13px;margin-left:8px;color:#5856d6"></span>
      </div>
    </div>
    <div class="form-row">
      <div><label>排程時間（Unix ms，空=立即）</label><input id="f_schedule" placeholder="留空即立即送"></div>
      <div></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-gray" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveBroadcast()">儲存草稿</button>
    </div>
  </div>
</div>

<script>
let broadcasts = [];
let currentEditId = null;

const show = (msg, type) => {
  const el = document.getElementById('msg');
  el.textContent = msg;
  el.className = type;
};

const api = async (method, path, body) => {
  const r = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  return r.json();
};

const load = async () => {
  const status = document.getElementById('statusFilter').value;
  const url = '/api/broadcasts' + (status ? `?status=${status}` : '');
  const data = await api('GET', url);
  broadcasts = data.broadcasts || [];
  render();
};

const render = () => {
  const tbody = document.getElementById('listBody');
  if (!broadcasts.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="color:#999;text-align:center">尚無廣播</td></tr>';
    return;
  }
  tbody.innerHTML = broadcasts.map(b => `
    <tr>
      <td>${b.name}</td>
      <td>${b.channel.toUpperCase()}</td>
      <td><span class="badge badge-${b.status}">${b.status}</span></td>
      <td>${b.total_targets}</td>
      <td>${b.sent_count}</td>
      <td>${b.ab_test_id
        ? `<a href="/admin/ab-tests.html" style="font-size:12px;color:#5856d6;text-decoration:none">測試 #${b.ab_test_id}${b.ab_variant ? ' ('+b.ab_variant+')' : ''}</a>`
        : '—'
      }</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        ${b.status === 'draft' && !b.ab_test_id ? `<button class="btn btn-green" style="padding:3px 8px;font-size:12px" onclick="sendNow(${b.id})">立即送</button>` : ''}
        <button class="btn btn-gray" style="padding:3px 8px;font-size:12px" onclick="viewStats(${b.id})">統計</button>
        ${b.status === 'draft' && !b.ab_test_id ? `<button class="btn btn-red" style="padding:3px 8px;font-size:12px" onclick="deleteBroadcast(${b.id})">刪除</button>` : ''}
      </td>
    </tr>
  `).join('');
};

const openCreate = () => {
  currentEditId = null;
  document.getElementById('modalTitle').textContent = '新增廣播';
  ['f_name','f_content','f_tags','f_schedule'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('previewResult').textContent = '';
  document.getElementById('overlay').style.display = 'block';
};

const closeModal = () => { document.getElementById('overlay').style.display = 'none'; };

const getFilter = () => {
  const tags = document.getElementById('f_tags').value.split(',').map(t => t.trim()).filter(Boolean);
  const emotionEl = document.getElementById('f_emotion');
  const emotions = Array.from(emotionEl.selectedOptions).map(o => o.value);
  const filter = {};
  if (tags.length) filter.tags = tags;
  if (emotions.length) filter.emotion_in = emotions;
  return filter;
};

const preview = async () => {
  const filter = getFilter();
  const id = currentEditId;
  if (!id) {
    // 先建草稿才能 preview，改為直接透過 POST 預估
    const data = await api('POST', '/api/broadcasts', {
      name: document.getElementById('f_name').value || '預覽用草稿',
      channel: document.getElementById('f_channel').value,
      content: document.getElementById('f_content').value || '預覽',
      segment_filter: filter,
    });
    if (!data.id) return;
    currentEditId = data.id;
  }
  const r = await api('POST', `/api/broadcasts/${currentEditId}/preview`, { filter });
  document.getElementById('previewResult').textContent = `約 ${r.count} 人符合`;
};

const saveBroadcast = async () => {
  const name = document.getElementById('f_name').value.trim();
  const content = document.getElementById('f_content').value.trim();
  if (!name || !content) { alert('請填名稱與內容'); return; }

  const filter = getFilter();
  const body = {
    name, content,
    channel: document.getElementById('f_channel').value,
    segment_filter: Object.keys(filter).length ? filter : null,
  };

  let result;
  if (currentEditId) {
    result = await api('PUT', `/api/broadcasts/${currentEditId}`, body);
  } else {
    result = await api('POST', '/api/broadcasts', body);
  }

  if (result.ok || result.id) {
    if (!currentEditId) currentEditId = result.id;
    const schedAt = document.getElementById('f_schedule').value.trim();
    if (schedAt) {
      await api('POST', `/api/broadcasts/${currentEditId}/schedule`, { scheduled_at: parseInt(schedAt) });
      show('廣播已排程', 'ok');
    } else {
      show('草稿已儲存', 'ok');
    }
    closeModal();
    load();
  } else {
    show(result.error || '儲存失敗', 'err');
  }
};

const sendNow = async (id) => {
  if (!confirm('確定立即發送？')) return;
  const r = await api('POST', `/api/broadcasts/${id}/send-now`, {});
  if (r.ok) { show(`廣播送出中，目標 ${r.total_targets} 人`, 'ok'); load(); } else { show(r.error, 'err'); }
};

const deleteBroadcast = async (id) => {
  if (!confirm('確定刪除？')) return;
  const r = await api('DELETE', `/api/broadcasts/${id}`);
  if (r.ok) { show('已刪除', 'ok'); load(); } else { show(r.error, 'err'); }
};

const viewStats = async (id) => {
  const [stats, fbStats] = await Promise.all([
    api('GET', `/api/broadcasts/${id}/stats`),
    api('GET', `/api/broadcasts/${id}/feedback-stats`),
  ]);

  const totalFb = fbStats.total || 0;
  const usefulPct = totalFb > 0 ? Math.round((fbStats.counts?.useful || 0) / totalFb * 100) : 0;
  const notUsefulPct = totalFb > 0 ? Math.round((fbStats.counts?.not_useful || 0) / totalFb * 100) : 0;
  const unsubPct = totalFb > 0 ? Math.round((fbStats.counts?.unsubscribe || 0) / totalFb * 100) : 0;

  const commentsHtml = (fbStats.recent_comments || []).length
    ? (fbStats.recent_comments || []).map(c =>
        `<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px">
          <span style="font-weight:600">${c.customer_name || '匿名'}</span>
          <span style="margin-left:6px;color:${c.feedback==='useful'?'#1b7c3e':c.feedback==='unsubscribe'?'#b00':'#7c4800'};font-size:12px">${c.feedback==='useful'?'👍 有幫助':c.feedback==='not_useful'?'👎 沒幫助':'🚫 取消訂閱'}</span>
          <div style="color:#666;margin-top:2px">${c.comment}</div>
        </div>`
      ).join('')
    : '<div style="color:#999;font-size:13px">尚無評語</div>';

  const statsOverlay = document.createElement('div');
  statsOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;overflow-y:auto';
  statsOverlay.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:24px;max-width:560px;width:90%;margin:40px auto;position:relative">
      <button onclick="this.closest('[style*=fixed]').remove()" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#999">✕</button>
      <h3 style="margin:0 0 16px;font-size:18px">廣播統計 — ${stats.name || ''}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;text-align:center">
        <div style="background:#f8f8fb;border-radius:8px;padding:12px">
          <div style="font-size:24px;font-weight:700">${stats.total_targets || 0}</div>
          <div style="font-size:12px;color:#888">目標人數</div>
        </div>
        <div style="background:#f8f8fb;border-radius:8px;padding:12px">
          <div style="font-size:24px;font-weight:700">${stats.delivery_rate || 0}%</div>
          <div style="font-size:12px;color:#888">送達率</div>
        </div>
        <div style="background:#f8f8fb;border-radius:8px;padding:12px">
          <div style="font-size:24px;font-weight:700">${stats.open_rate || 0}%</div>
          <div style="font-size:12px;color:#888">開啟率</div>
        </div>
      </div>

      <div style="border-top:1px solid #f0f0f0;padding-top:16px;margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <strong style="font-size:14px">顧客回饋</strong>
          <span style="font-size:12px;color:#888">共 ${totalFb} 則</span>
        </div>
        ${totalFb === 0 ? '<div style="color:#999;font-size:13px;text-align:center;padding:12px 0">尚無評價</div>' : `
        <div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:3px"><span>👍 有幫助</span><span>${fbStats.counts?.useful || 0} 人 (${usefulPct}%)</span></div>
          <div style="height:10px;background:#e5e5ea;border-radius:5px;overflow:hidden"><div style="height:100%;background:#34c759;width:${usefulPct}%;border-radius:5px;transition:width 0.3s"></div></div>
        </div>
        <div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:3px"><span>👎 沒幫助</span><span>${fbStats.counts?.not_useful || 0} 人 (${notUsefulPct}%)</span></div>
          <div style="height:10px;background:#e5e5ea;border-radius:5px;overflow:hidden"><div style="height:100%;background:#ff9500;width:${notUsefulPct}%;border-radius:5px;transition:width 0.3s"></div></div>
        </div>
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:3px"><span>🚫 取消訂閱</span><span>${fbStats.counts?.unsubscribe || 0} 人 (${unsubPct}%)</span></div>
          <div style="height:10px;background:#e5e5ea;border-radius:5px;overflow:hidden"><div style="height:100%;background:#ff3b30;width:${unsubPct}%;border-radius:5px;transition:width 0.3s"></div></div>
        </div>
        ${fbStats.useful_rate !== null ? `<div style="text-align:center;font-size:13px;color:#555;background:#f8f8fb;border-radius:8px;padding:8px">整體評分：<strong style="color:${fbStats.useful_rate>=60?'#1b7c3e':'#b00'}">${fbStats.useful_rate}% 覺得有用</strong>（排除取消訂閱）</div>` : ''}
        `}
      </div>

      <div style="border-top:1px solid #f0f0f0;padding-top:12px">
        <strong style="font-size:13px">評語（最近 10 則）</strong>
        <div style="margin-top:8px">${commentsHtml}</div>
      </div>
    </div>
  `;
  statsOverlay.addEventListener('click', e => { if (e.target === statsOverlay) statsOverlay.remove(); });
  document.body.appendChild(statsOverlay);
};

load();
</script>
</body>
</html>
