<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>績效報表 — 客服中心</title>
<link rel="stylesheet" href="/styles.css">
<style>
  body { font-family: system-ui, sans-serif; background: #f5f5f7; margin: 0; }
  .topnav { background: #1a1a2e; color: #fff; padding: 0 20px; display: flex; align-items: center; gap: 16px; height: 48px; font-size: 14px; }
  .topnav a { color: #ccc; text-decoration: none; padding: 4px 8px; border-radius: 4px; }
  .topnav a:hover, .topnav a.active { color: #fff; background: rgba(255,255,255,0.1); }
  .topnav .brand { font-weight: 700; color: #fff; margin-right: 8px; }
  .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .kpi { background: #fff; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .kpi-val { font-size: 28px; font-weight: 700; color: #5856d6; }
  .kpi-lbl { font-size: 13px; color: #888; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
  th { color: #666; font-weight: 500; }
  .bar-chart { padding: 8px 0; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
  .bar-label { width: 100px; text-align: right; color: #666; flex-shrink: 0; }
  .bar-track { flex: 1; height: 18px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: #5856d6; border-radius: 4px; transition: width 0.5s; }
  .bar-val { width: 50px; color: #333; font-size: 12px; }
  .range-btns { display: flex; gap: 4px; }
  .range-btns button { padding: 4px 10px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
  .range-btns button.active { background: #5856d6; color: #fff; border-color: #5856d6; }
  .cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .funnel-step { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .funnel-bar { flex: 1; height: 28px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
  .funnel-fill { height: 100%; background: linear-gradient(90deg, #5856d6, #a29ef8); transition: width 0.5s; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: #fff; font-size: 12px; }
  /* CSAT 迷你分布 bar */
  .csat-mini { display: flex; gap: 2px; height: 16px; width: 120px; border-radius: 3px; overflow: hidden; }
  .csat-mini-seg { height: 100%; transition: width 0.4s; }
  .csat-mini-5 { background: #43a047; }
  .csat-mini-4 { background: #8bc34a; }
  .csat-mini-3 { background: #ffc107; }
  .csat-mini-2 { background: #ff7043; }
  .csat-mini-1 { background: #e53935; }
  /* Modal */
  .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal-box { background:#fff;border-radius:16px;width:680px;max-width:95vw;max-height:88vh;overflow-y:auto;padding:28px;position:relative; }
  .modal-close { position:absolute;top:16px;right:20px;border:none;background:none;font-size:20px;cursor:pointer;color:#888; }
  .modal-h { font-size:18px;font-weight:700;margin:0 0 16px; }
  /* 趨勢圖（純 CSS bar，每日一格）*/
  .trend-grid { display:flex;align-items:flex-end;gap:3px;height:60px;padding:4px 0; }
  .trend-bar { flex:1;background:#5856d6;border-radius:2px 2px 0 0;min-height:2px;transition:height 0.4s; }
  .trend-bar.zero { background:#e8e8e8; }
  .trend-label-row { display:flex;gap:3px;font-size:9px;color:#aaa;overflow:hidden; }
  .trend-label-row span { flex:1;text-align:center;overflow:hidden; }
  /* Badge 標籤 */
  .badge { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin:3px 3px 3px 0; }
  .badge-star5 { background:#fff8e1;color:#f57f17;border:1px solid #ffe082; }
  .badge-perfect { background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7; }
  .badge-weekly { background:#e3f2fd;color:#1565c0;border:1px solid #90caf9; }
  .badge-improve { background:#fce4ec;color:#ad1457;border:1px solid #f48fb1; }
  /* 評語列 */
  .comment-item { padding:10px 0;border-bottom:1px solid #f0f0f0; }
  .comment-item:last-child { border-bottom:none; }
  .comment-score { display:inline-flex;gap:1px;font-size:13px;margin-bottom:4px; }
  .comment-text { font-size:13px;color:#333; }
  .comment-meta { font-size:11px;color:#aaa;margin-top:2px; }
  /* 排行榜可點 */
  tr.agent-row { cursor:pointer; }
  tr.agent-row:hover td { background:#f5f5ff; }
  /* 排序選項 */
  .sort-tabs { display:flex;gap:6px;margin-bottom:12px; }
  .sort-tab { padding:4px 12px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:12px;color:#666; }
  .sort-tab.active { background:#5856d6;color:#fff;border-color:#5856d6; }
</style>
</head>
<body>
<nav class="topnav">
  <span class="brand">CS Hub</span>
  <a href="/dashboard.html">首頁</a>
  <a href="/index.html">客服</a>
  <a href="/knowledge.html">知識庫</a>
  <a href="/admin/games.html">活動</a>
  <a href="/admin/broadcasts.html">廣播</a>
  <a href="/admin/ecommerce.html">訂單</a>
  <a href="/admin/rich-menus.html">圖文選單</a>
  <a href="/admin/journeys.html">旅程</a>
  <a href="/admin/analytics.html" class="active">報表</a>
  <a href="/admin/voc.html">VoC 洞察</a>
  <a href="/admin.html">設定</a>
</nav>

<div class="container">
  <div class="card" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <h2 style="margin:0">績效報表</h2>
    <div class="range-btns">
      <button onclick="setRange(1)" >今日</button>
      <button onclick="setRange(7)" class="active">7天</button>
      <button onclick="setRange(30)">30天</button>
    </div>
  </div>

  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi"><div class="kpi-val" id="kpi_open">-</div><div class="kpi-lbl">開啟對話</div></div>
    <div class="kpi"><div class="kpi-val" id="kpi_msgs">-</div><div class="kpi-lbl">今日訊息</div></div>
    <div class="kpi"><div class="kpi-val" id="kpi_csat">-</div><div class="kpi-lbl">CSAT 平均</div></div>
    <div class="kpi"><div class="kpi-val" id="kpi_draft">-</div><div class="kpi-lbl">AI 草擬接受率</div></div>
  </div>

  <div class="cols-2">
    <div class="card">
      <h3 style="margin:0 0 12px">意圖分布</h3>
      <div class="bar-chart" id="intentChart"></div>
    </div>
    <div class="card">
      <h3 style="margin:0 0 12px">情緒分布</h3>
      <div class="bar-chart" id="emotionChart"></div>
    </div>
  </div>

  <div class="cols-2">
    <div class="card">
      <h3 style="margin:0 0 12px">對話漏斗</h3>
      <div id="funnelChart"></div>
    </div>
    <div class="card">
      <h3 style="margin:0 0 12px">AI 草擬版本偏好</h3>
      <div class="bar-chart" id="draftVariantChart"></div>
    </div>
  </div>

  <!-- 客服績效排行（A3 + B 個人評分）-->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
      <h3 style="margin:0">客服績效排行</h3>
      <div class="range-btns" id="agent-range-btns">
        <button onclick="setAgentRange(1)">今日</button>
        <button onclick="setAgentRange(7)" class="active">7天</button>
        <button onclick="setAgentRange(30)">30天</button>
        <button onclick="showCustomRange()">自訂</button>
      </div>
    </div>
    <div id="agent-custom-range" style="display:none;margin-bottom:12px;gap:8px;align-items:center;flex-wrap:wrap;">
      <input type="date" id="agent-from-date" style="border:1px solid #ddd;border-radius:4px;padding:4px 8px;font-size:13px;" />
      <span style="color:#888;">至</span>
      <input type="date" id="agent-to-date" style="border:1px solid #ddd;border-radius:4px;padding:4px 8px;font-size:13px;" />
      <button onclick="applyCustomRange()" style="padding:4px 12px;border:1px solid #5856d6;border-radius:4px;background:#5856d6;color:#fff;cursor:pointer;font-size:13px;">套用</button>
    </div>
    <!-- 排序選項 -->
    <div class="sort-tabs">
      <span style="font-size:12px;color:#888;align-self:center;margin-right:4px;">排序：</span>
      <button class="sort-tab active" onclick="setSortMode('score')">綜合分</button>
      <button class="sort-tab" onclick="setSortMode('csat_avg')">CSAT 平均</button>
      <button class="sort-tab" onclick="setSortMode('csat_count')">CSAT 數量</button>
    </div>
    <div style="font-size:12px;color:#888;margin-bottom:12px;">綜合分 = 訊息數 × 1 + 解決數 × 5 + CSAT × 10 − 首回時間（分）｜點擊客服列展開詳情</div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th style="width:40px;">排名</th>
            <th>客服</th>
            <th>狀態</th>
            <th>訊息數</th>
            <th>平均首回</th>
            <th>CSAT 均分</th>
            <th>CSAT 分布</th>
            <th>AI 接受率</th>
            <th>解決數</th>
            <th>綜合分</th>
          </tr>
        </thead>
        <tbody id="agentRankBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 舊版客服績效（保留相容性）-->
  <div class="card" style="display:none;">
    <h3 style="margin:0 0 12px">客服績效（舊版）</h3>
    <table>
      <thead><tr><th>客服</th><th>訊息數</th><th>平均 FRT</th><th>已解決對話</th><th>平均解決時間</th><th>CSAT</th></tr></thead>
      <tbody id="agentsBody"></tbody>
    </table>
  </div>
</div>

<!-- 客服詳情 Modal -->
<div class="modal-overlay" id="agentModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-h" id="modalTitle">客服詳情</div>
    <div id="modalBody">載入中...</div>
  </div>
</div>

<script>
const msToMin = ms => ms ? Math.round(ms / 60000) + ' 分' : '-';
const getCsrfToken = () => {
  const match = document.cookie.split(';').map(s => s.trim()).find(s => s.startsWith('cs_csrf='));
  return match ? match.slice(8) : '';
};
const api = async (path) => {
  const r = await fetch(path, { headers: { 'x-csrf-token': getCsrfToken() } });
  return r.json();
};

let rangeDay = 7;
let from, to;

const setRange = (days) => {
  rangeDay = days;
  document.querySelectorAll('.range-btns button').forEach((b, i) => b.classList.toggle('active', [1, 7, 30][i] === days));
  to = Date.now();
  from = to - days * 86400000;
  loadAll();
};

const renderBarChart = (containerId, data, labelKey, valueKey) => {
  const el = document.getElementById(containerId);
  if (!data.length) { el.innerHTML = '<span style="color:#999">無資料</span>'; return; }
  const max = Math.max(...data.map(d => d[valueKey]));
  el.innerHTML = data.map(d => `
    <div class="bar-row">
      <div class="bar-label">${d[labelKey]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${max ? Math.round(d[valueKey]/max*100) : 0}%"></div></div>
      <div class="bar-val">${d[valueKey]}</div>
    </div>
  `).join('');
};

const loadAll = async () => {
  const qs = `from=${from}&to=${to}`;

  const [stats, intents, emotions, drafts, funnel, agents] = await Promise.all([
    api('/api/stats'),
    api(`/api/analytics/conversations?group_by=intent&${qs}`),
    api(`/api/analytics/conversations?group_by=emotion&${qs}`),
    api(`/api/analytics/drafts?${qs}`),
    api(`/api/analytics/funnel?${qs}`),
    api(`/api/analytics/agents?${qs}`),
  ]);

  document.getElementById('kpi_open').textContent = stats.open_conversations ?? '-';
  document.getElementById('kpi_msgs').textContent = stats.today_messages ?? '-';
  document.getElementById('kpi_csat').textContent = stats.csat_avg ?? '-';
  document.getElementById('kpi_draft').textContent = (drafts.acceptance_rate_pct ?? '-') + (drafts.acceptance_rate_pct !== undefined ? '%' : '');

  renderBarChart('intentChart', intents.data || [], 'label', 'count');
  renderBarChart('emotionChart', emotions.data || [], 'label', 'count');
  renderBarChart('draftVariantChart', (drafts.by_variant || []).map(v => ({ label: v.variant, count: v.approved })), 'label', 'count');

  // 漏斗
  const funnelData = funnel.funnel || [];
  const maxF = Math.max(...funnelData.map(f => f.count), 1);
  const funnelLabels = { new_conversation: '新對話', engaged: '互動', resolved: '解決', csat_submitted: 'CSAT' };
  document.getElementById('funnelChart').innerHTML = funnelData.map(f => `
    <div class="funnel-step">
      <div style="width:80px;font-size:13px;color:#666">${funnelLabels[f.stage] || f.stage}</div>
      <div class="funnel-bar"><div class="funnel-fill" style="width:${Math.round(f.count/maxF*100)}%">${f.count}</div></div>
    </div>
  `).join('');

  // 舊版客服績效（保留）
  const tbody = document.getElementById('agentsBody');
  if (tbody) {
    const agentList = agents.agents || [];
    if (!agentList.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="color:#999;text-align:center">無資料</td></tr>';
    } else {
      tbody.innerHTML = agentList.map(a => `
        <tr>
          <td>${a.username}</td>
          <td>${a.message_count}</td>
          <td>${msToMin(a.avg_frt_ms)}</td>
          <td>${a.resolved_count}</td>
          <td>${msToMin(a.avg_resolve_ms)}</td>
          <td>${a.csat_avg ?? '-'}</td>
        </tr>
      `).join('');
    }
  }

  // A3 績效排行
  renderAgentRank(agents.agents || []);
};

// ─── CSAT 迷你分布 bar ───
const renderCsatMini = (a) => {
  const total = (a.csat_5_count || 0) + (a.csat_4_count || 0) + (a.csat_3_count || 0) + (a.csat_2_count || 0) + (a.csat_1_count || 0);
  if (!total) return '<span style="color:#ccc;font-size:12px;">無</span>';
  const pct = (n) => total ? Math.round(n / total * 100) : 0;
  const p5 = pct(a.csat_5_count || 0), p4 = pct(a.csat_4_count || 0), p3 = pct(a.csat_3_count || 0), p2 = pct(a.csat_2_count || 0), p1 = pct(a.csat_1_count || 0);
  return `
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div class="csat-mini" title="5★:${a.csat_5_count} 4★:${a.csat_4_count} 3★:${a.csat_3_count} 2★:${a.csat_2_count} 1★:${a.csat_1_count}">
        <div class="csat-mini-seg csat-mini-5" style="width:${p5}%"></div>
        <div class="csat-mini-seg csat-mini-4" style="width:${p4}%"></div>
        <div class="csat-mini-seg csat-mini-3" style="width:${p3}%"></div>
        <div class="csat-mini-seg csat-mini-2" style="width:${p2}%"></div>
        <div class="csat-mini-seg csat-mini-1" style="width:${p1}%"></div>
      </div>
      <div style="font-size:10px;color:#aaa;">${total} 則</div>
    </div>`;
};

// ─── A3. 客服績效排行 ───
let agentFrom, agentTo;
let agentRangeDay = 7;
let sortMode = 'score';

const STATUS_DOT = {
  online:  '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#43a047;margin-right:4px;"></span>在線',
  away:    '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f57c00;margin-right:4px;"></span>離開',
  busy:    '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#e53935;margin-right:4px;"></span>忙碌',
  offline: '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#bbb;margin-right:4px;"></span>離線',
};

let onlineUsers = {};

const loadOnlineUsers = async () => {
  try {
    const data = await api('/api/users/online');
    onlineUsers = {};
    for (const u of (data.users || [])) {
      onlineUsers[u.id] = u.online_status;
    }
  } catch {}
};

const calcScore = (a) => {
  const frtPenalty = a.avg_frt_ms ? a.avg_frt_ms / 60000 : 0;
  return Math.round((a.message_count || 0) * 1 + (a.resolved_count || 0) * 5 + (a.csat_avg || 0) * 10 - frtPenalty);
};

const MEDALS = ['1', '2', '3'];

window.setSortMode = (mode) => {
  sortMode = mode;
  document.querySelectorAll('.sort-tab').forEach(b => b.classList.toggle('active', b.textContent.includes(
    mode === 'score' ? '綜合分' : mode === 'csat_avg' ? 'CSAT 平均' : 'CSAT 數量'
  )));
  // 用最後一次取到的 agentList 重排
  if (window._lastAgentList) renderAgentRank(window._lastAgentList);
};

const renderAgentRank = (agentList) => {
  window._lastAgentList = agentList;
  const withScore = agentList.map(a => ({ ...a, score: calcScore(a) }));
  let sorted;
  if (sortMode === 'csat_avg') {
    sorted = [...withScore].sort((a, b) => (b.csat_avg || 0) - (a.csat_avg || 0));
  } else if (sortMode === 'csat_count') {
    sorted = [...withScore].sort((a, b) => (b.csat_count || 0) - (a.csat_count || 0));
  } else {
    sorted = [...withScore].sort((a, b) => b.score - a.score);
  }

  const tbody = document.getElementById('agentRankBody');
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="10" style="color:#999;text-align:center">無資料（請先選擇有活動的業主時間範圍）</td></tr>';
    return;
  }
  tbody.innerHTML = sorted.map((a, i) => {
    const medal = i < 3 ? `<span style="font-size:16px;">${['', '', ''][i]}</span>` : `${i + 1}`;
    const status = onlineUsers[a.user_id] || 'offline';
    const statusHtml = STATUS_DOT[status] || STATUS_DOT.offline;
    return `
      <tr class="agent-row" onclick="openAgentModal(${a.user_id}, '${escHtml(a.username)}')"${i < 3 ? ' style="background:#fafafa;font-weight:500;"' : ''}>
        <td style="text-align:center;">${medal}</td>
        <td><strong>${escHtml(a.username)}</strong></td>
        <td style="font-size:12px;">${statusHtml}</td>
        <td>${a.message_count}</td>
        <td>${msToMin(a.avg_frt_ms)}</td>
        <td>${a.csat_avg != null ? a.csat_avg + ' ★' : '—'} <span style="font-size:11px;color:#aaa;">(${a.csat_count || 0})</span></td>
        <td>${renderCsatMini(a)}</td>
        <td>—</td>
        <td>${a.resolved_count}</td>
        <td style="font-weight:600;color:#5856d6;">${a.score}</td>
      </tr>
    `;
  }).join('');
};

const escHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ─── 客服詳情 Modal ───
let _modalUserId = null;

window.openAgentModal = async (userId, username) => {
  _modalUserId = userId;
  document.getElementById('modalTitle').textContent = `${username} 的 CSAT 詳情`;
  document.getElementById('modalBody').innerHTML = '<div style="color:#aaa;text-align:center;padding:24px">載入中...</div>';
  document.getElementById('agentModal').classList.add('open');

  const qs = `from=${agentFrom}&to=${agentTo}`;
  const [ratings, badges] = await Promise.all([
    api(`/api/analytics/agents/${userId}/ratings?${qs}&limit=10`),
    api(`/api/analytics/agents/${userId}/badges`),
  ]).catch(() => [{}, {}]);

  const s = ratings.summary || {};
  const total = (s.csat_5_count || 0) + (s.csat_4_count || 0) + (s.csat_3_count || 0) + (s.csat_2_count || 0) + (s.csat_1_count || 0);

  // 5 星分布
  const distHtml = [
    { label: '5 ★', count: s.csat_5_count || 0, cls: 'csat-mini-5' },
    { label: '4 ★', count: s.csat_4_count || 0, cls: 'csat-mini-4' },
    { label: '3 ★', count: s.csat_3_count || 0, cls: 'csat-mini-3' },
    { label: '2 ★', count: s.csat_2_count || 0, cls: 'csat-mini-2' },
    { label: '1 ★', count: s.csat_1_count || 0, cls: 'csat-mini-1' },
  ].map(row => {
    const pct = total ? Math.round(row.count / total * 100) : 0;
    return `
      <div class="bar-row" style="margin-bottom:6px;">
        <div class="bar-label" style="width:40px;font-size:13px;">${row.label}</div>
        <div class="bar-track" style="height:14px;">
          <div class="${row.cls}" style="height:100%;width:${pct}%;border-radius:3px;"></div>
        </div>
        <div class="bar-val">${row.count}</div>
      </div>`;
  }).join('');

  // 趨勢圖：最近 30 天（由 ratings 清單聚合）
  const trendMap = {};
  const nowD = Date.now();
  for (let i = 29; i >= 0; i--) {
    const d = new Date(nowD - i * 86400000);
    const key = `${d.getUTCMonth()+1}/${d.getUTCDate()}`;
    trendMap[key] = { sum: 0, cnt: 0 };
  }
  for (const r of (ratings.ratings || [])) {
    const d = new Date(r.created_at);
    const key = `${d.getUTCMonth()+1}/${d.getUTCDate()}`;
    if (trendMap[key]) { trendMap[key].sum += r.score; trendMap[key].cnt++; }
  }
  const trendDays = Object.entries(trendMap);
  const maxTrend = Math.max(...trendDays.map(([, v]) => v.cnt), 1);
  const trendBarsHtml = trendDays.map(([label, v]) => {
    const h = v.cnt ? Math.max(4, Math.round(v.cnt / maxTrend * 52)) : 0;
    return `<div class="trend-bar${v.cnt ? '' : ' zero'}" style="height:${h || 2}px;" title="${label}: ${v.cnt ? (v.sum/v.cnt).toFixed(1)+'★' : '無'}"></div>`;
  }).join('');
  const trendLabelsHtml = trendDays.filter((_, i) => i % 5 === 0).map(([label]) => `<span>${label}</span>`).join('');

  // Badges
  const badgeList = badges.badges || [];
  const badgeClassMap = { star5_king: 'badge-star5', perfect_service: 'badge-perfect', weekly_champ: 'badge-weekly', improving: 'badge-improve' };
  const badgesHtml = badgeList.length
    ? badgeList.map(b => `<span class="badge ${badgeClassMap[b.id] || ''}" title="${escHtml(b.desc)}">${escHtml(b.label)}</span>`).join('')
    : '<span style="color:#aaa;font-size:13px;">尚無成就</span>';

  // 最近 10 則評語
  const commentsList = (ratings.ratings || []).filter(r => r.comment).slice(0, 10);
  const commentsHtml = commentsList.length
    ? commentsList.map(r => `
        <div class="comment-item">
          <div class="comment-score">${'★'.repeat(r.score)}${'☆'.repeat(5 - r.score)}</div>
          <div class="comment-text">${escHtml(r.comment)}</div>
          <div class="comment-meta">
            ${r.customer_name ? escHtml(r.customer_name) + '｜' : ''}
            <a href="/index.html?conversation_id=${r.conversation_id}" style="color:#5856d6;font-size:11px;">對話 #${r.conversation_id}</a>
            ｜${new Date(r.created_at).toLocaleString('zh-TW')}
          </div>
        </div>`).join('')
    : '<span style="color:#aaa;font-size:13px;">此時段無評語</span>';

  document.getElementById('modalBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
      <div>
        <div style="font-size:13px;color:#888;margin-bottom:8px;">CSAT 均分</div>
        <div style="font-size:32px;font-weight:700;color:#5856d6;">${s.csat_avg != null ? s.csat_avg : '—'} <span style="font-size:16px;">★</span></div>
        <div style="font-size:12px;color:#aaa;">共 ${s.csat_count || 0} 則評分</div>
      </div>
      <div>
        <div style="font-size:13px;color:#888;margin-bottom:8px;">成就徽章</div>
        ${badgesHtml}
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <div style="font-size:13px;color:#888;font-weight:600;margin-bottom:8px;">星數分布</div>
      ${total ? distHtml : '<span style="color:#aaa;font-size:13px;">無評分資料</span>'}
    </div>

    <div style="margin-bottom:16px;">
      <div style="font-size:13px;color:#888;font-weight:600;margin-bottom:6px;">近 30 天 CSAT 趨勢（每日評分數）</div>
      <div class="trend-grid">${trendBarsHtml}</div>
      <div class="trend-label-row">${trendLabelsHtml}</div>
    </div>

    <div>
      <div style="font-size:13px;color:#888;font-weight:600;margin-bottom:8px;">最近評語（最多 10 則）</div>
      ${commentsHtml}
    </div>
  `;
};

window.closeModal = () => {
  document.getElementById('agentModal').classList.remove('open');
  _modalUserId = null;
};

// 點 overlay 關閉
document.getElementById('agentModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

const loadAgentRank = async () => {
  await loadOnlineUsers();
  try {
    const qs = `from=${agentFrom}&to=${agentTo}`;
    const data = await api(`/api/analytics/agents?${qs}`);
    renderAgentRank(data.agents || []);
  } catch {}
};

window.setAgentRange = (days) => {
  agentRangeDay = days;
  document.querySelectorAll('#agent-range-btns button').forEach((b, i) => b.classList.toggle('active', [1, 7, 30, -1][i] === days));
  agentTo = Date.now();
  agentFrom = agentTo - days * 86400000;
  document.getElementById('agent-custom-range').style.display = 'none';
  loadAgentRank();
};

window.showCustomRange = () => {
  document.getElementById('agent-custom-range').style.display = 'flex';
  document.querySelectorAll('#agent-range-btns button').forEach(b => b.classList.remove('active'));
};

window.applyCustomRange = () => {
  const fromVal = document.getElementById('agent-from-date').value;
  const toVal = document.getElementById('agent-to-date').value;
  if (!fromVal || !toVal) return;
  agentFrom = new Date(fromVal).getTime();
  agentTo = new Date(toVal).getTime() + 86399999;
  loadAgentRank();
};

// 初始化排行榜時間範圍（跟全局 setRange 同步）
agentFrom = Date.now() - 7 * 86400000;
agentTo = Date.now();

loadOnlineUsers().catch(() => {});
setRange(7);
</script>
</body>
</html>
