<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>儀表板 — 客服中心</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { overflow: auto; }
    #app { display: block; }

    .dash-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .page-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .page-sub   { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    /* KPI 卡 */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .kpi-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .kpi-value { font-size: 32px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .kpi-sub   { font-size: 12px; color: var(--text-sub); }

    /* 分區塊 */
    .dash-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .dash-section-header {
      padding: 14px 20px;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    .dash-section-body { padding: 16px 20px; }

    /* Token 狀態列 */
    .token-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
      flex-wrap: wrap;
      gap: 8px;
    }
    .token-row:last-child { border-bottom: none; }
    .token-client-name { font-weight: 500; font-size: 13px; }
    .token-indicators { display: flex; gap: 8px; flex-wrap: wrap; }
    .indicator {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .indicator.green  { background: #e8f5e9; color: #2e7d32; }
    .indicator.yellow { background: #fff8e1; color: #f57f17; }
    .indicator.red    { background: #ffebee; color: #c62828; }

    /* Audit log 表格 */
    .audit-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .audit-table th {
      text-align: left;
      color: var(--muted);
      font-weight: 500;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .audit-table td {
      padding: 8px 8px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: top;
    }
    .audit-table tr:last-child td { border-bottom: none; }
    .audit-action {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 8px;
      font-size: 11px;
      background: var(--border-light);
      color: var(--text-sub);
      font-family: monospace;
    }

    /* 快捷連結 */
    .quick-links { display: flex; gap: 12px; flex-wrap: wrap; padding: 16px 20px; }
    .quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .quick-link:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .quick-link .icon { font-size: 18px; }

    .empty-note { color: var(--muted); font-size: 13px; padding: 8px 0; }
  </style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <div class="logo">📊 <span>儀表板</span></div>
  <div id="topbar-right">
    <span id="user-info"></span>
    <a href="/admin.html" id="admin-link" style="display:none; font-size:12px; color:var(--text-sub); text-decoration:none; border:1px solid var(--border); padding:4px 10px; border-radius:var(--radius-sm);">設定</a>
    <button id="logout-btn">登出</button>
  </div>
</div>

<div id="app">
  <div class="dash-wrap">
    <div class="page-title">儀表板</div>
    <div class="page-sub" id="dash-sub">載入中…</div>

    <!-- KPI 卡 -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">今日新訊息</div>
        <div class="kpi-value" id="kpi-today">—</div>
        <div class="kpi-sub">今天收到的訊息數</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">未回覆對話</div>
        <div class="kpi-value" id="kpi-unread">—</div>
        <div class="kpi-sub">有未讀訊息的對話</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">進行中對話</div>
        <div class="kpi-value" id="kpi-open">—</div>
        <div class="kpi-sub">狀態 = open</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">本月訊息</div>
        <div class="kpi-value" id="kpi-month">—</div>
        <div class="kpi-sub">本月累計訊息數</div>
      </div>
    </div>

    <!-- Token 狀態警示（admin 才顯示）-->
    <div class="dash-section" id="token-section" style="display:none;">
      <div class="dash-section-header">業主 Token 狀態</div>
      <div class="dash-section-body" id="token-status-list">載入中…</div>
    </div>

    <!-- 最近 Audit Log（admin 才顯示）-->
    <div class="dash-section" id="audit-section" style="display:none;">
      <div class="dash-section-header">最近操作紀錄（最新 10 筆）</div>
      <div class="dash-section-body" id="audit-list">載入中…</div>
    </div>

    <!-- 快捷連結 -->
    <div class="dash-section">
      <div class="dash-section-header">快速操作</div>
      <div class="quick-links">
        <a href="/" class="quick-link"><span class="icon">💬</span>開始客服</a>
        <a href="/admin.html" class="quick-link" id="admin-quick" style="display:none;"><span class="icon">⚙️</span>Token 設定</a>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);

const api = async (method, path, body) => {
  const opts = { method, headers: { 'content-type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 401) { location.href = '/login.html'; throw new Error('未登入'); }
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.error || `HTTP ${r.status}`); }
  return r.json();
};

const esc = (s) => {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
};

const fmtTime = (ms) => {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
};

const init = async () => {
  let me;
  try {
    me = await api('GET', '/api/me');
  } catch {
    location.href = '/login.html';
    return;
  }

  $('#user-info').textContent = `${me.username} (${me.role})`;
  $('#dash-sub').textContent = `歡迎回來，${me.username}`;

  const isAdmin = me.role === 'admin';
  if (isAdmin) {
    $('#admin-link').style.display = '';
    $('#admin-quick').style.display = '';
  }

  // KPI
  const qp = me.client_id ? `?client_id=${me.client_id}` : '';
  try {
    const stats = await api('GET', `/api/stats${qp}`);
    $('#kpi-today').textContent  = stats.today_messages ?? '—';
    $('#kpi-unread').textContent = stats.unread_conversations ?? '—';
    $('#kpi-open').textContent   = stats.open_conversations ?? '—';
    $('#kpi-month').textContent  = stats.month_messages ?? '—';
  } catch {
    ['kpi-today','kpi-unread','kpi-open','kpi-month'].forEach(id => { $('#' + id).textContent = '—'; });
  }

  // Admin-only sections
  if (isAdmin) {
    $('#token-section').style.display = '';
    $('#audit-section').style.display = '';

    // Token 狀態
    try {
      const statusData = await api('GET', '/api/status');
      const listEl = $('#token-status-list');
      listEl.innerHTML = '';
      (statusData.clients || []).forEach(c => {
        const row = document.createElement('div');
        row.className = 'token-row';
        const pill = c.token_status;
        const pillLabel = { green: '全部已設定', yellow: '部分設定', red: '未設定' }[pill] || pill;
        row.innerHTML = `
          <div class="token-client-name">${esc(c.display_name)}</div>
          <div class="token-indicators">
            <span class="indicator ${c.has_line ? 'green' : 'red'}">LINE ${c.has_line ? 'OK' : '未設定'}</span>
            <span class="indicator ${c.has_fb ? 'green' : 'red'}">FB ${c.has_fb ? 'OK' : '未設定'}</span>
            <span class="indicator ${pill}">${pillLabel}</span>
          </div>
        `;
        listEl.appendChild(row);
      });
      if (!(statusData.clients || []).length) {
        listEl.innerHTML = '<div class="empty-note">尚無業主資料</div>';
      }
    } catch {
      $('#token-status-list').innerHTML = '<div class="empty-note">載入失敗</div>';
    }

    // Audit log
    try {
      const auditData = await api('GET', '/api/audit-logs?limit=10');
      const listEl = $('#audit-list');
      if (!(auditData.logs || []).length) {
        listEl.innerHTML = '<div class="empty-note">尚無操作紀錄</div>';
      } else {
        listEl.innerHTML = `
          <table class="audit-table">
            <thead>
              <tr>
                <th>時間</th>
                <th>動作</th>
                <th>User ID</th>
                <th>對象</th>
                <th>IP</th>
              </tr>
            </thead>
            <tbody id="audit-tbody"></tbody>
          </table>
        `;
        const tbody = $('#audit-tbody');
        auditData.logs.forEach(l => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${fmtTime(l.created_at)}</td>
            <td><span class="audit-action">${esc(l.action)}</span></td>
            <td>${l.user_id ?? '—'}</td>
            <td>${l.entity_type ? `${esc(l.entity_type)} #${l.entity_id}` : '—'}</td>
            <td>${esc(l.ip) || '—'}</td>
          `;
          tbody.appendChild(tr);
        });
      }
    } catch {
      $('#audit-list').innerHTML = '<div class="empty-note">載入失敗</div>';
    }
  }

  $('#logout-btn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST' });
    location.href = '/login.html';
  });
};

init();
</script>
</body>
</html>
